<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mario Sight Words</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;touch-action:manipulation;}
html,body{height:100dvh;}
body{font-family:'Press Start 2P',monospace;background:#5c94fc;color:#fff;}

.screen{position:fixed;inset:0;width:100%;height:100dvh;display:none;flex-direction:column;align-items:center;justify-content:center;}
.screen.on{display:flex;}

/* ======== TAP OVERLAY ======== */
#tap{position:fixed;inset:0;background:radial-gradient(circle,#1a0a40,#000);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;}
#tap h2{color:#fbd000;font-size:clamp(1rem,5vw,1.4rem);text-align:center;line-height:2;margin-bottom:16px;text-shadow:3px 3px 0 #e52b2b,6px 6px 0 #000;animation:tWiggle 2s ease-in-out infinite;}
@keyframes tWiggle{0%,100%{transform:rotate(-2deg) scale(1)}50%{transform:rotate(2deg) scale(1.05)}}
#tap p{color:#fff;font-size:clamp(.5rem,2.5vw,.7rem);opacity:.9;animation:tBlink 1s steps(2) infinite;}
@keyframes tBlink{50%{opacity:.3}}
.tap-hand{font-size:5rem;animation:hb .9s ease-in-out infinite alternate;margin-bottom:16px;}
@keyframes hb{from{transform:scale(1)}to{transform:scale(1.25)}}

/* ======== TITLE ======== */
#title{background:linear-gradient(180deg,#5c94fc 60%,#5a8a3c 60%,#5a8a3c 75%,#8B4513 75%);overflow:hidden;}
.clouds{position:absolute;top:8%;width:100%;display:flex;justify-content:space-around;pointer-events:none;font-size:2.5rem;}
.cl{animation:cf 3s ease-in-out infinite alternate;}
.cl:nth-child(2){animation-delay:.8s;}.cl:nth-child(3){animation-delay:1.5s;}
@keyframes cf{from{transform:translateY(0)}to{transform:translateY(-8px)}}
.t-coins{position:absolute;width:100%;height:100%;pointer-events:none;}
.t-coin{position:absolute;font-size:1.5rem;animation:tCoinFall 4s linear infinite;}
@keyframes tCoinFall{0%{transform:translateY(-50px) rotate(0deg)}100%{transform:translateY(110vh) rotate(720deg)}}
.t-mario{width:160px;height:180px;margin-bottom:10px;animation:tMarioBounce .5s ease-in-out infinite alternate;filter:drop-shadow(4px 4px 0 #000);}
@keyframes tMarioBounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}
.t-mario svg{width:100%;height:100%;}
.t-box{background:#1a0a00;border:4px solid #fbd000;padding:18px 24px;text-align:center;margin-bottom:18px;box-shadow:6px 6px 0 #e52b2b,10px 10px 0 #fbd000;animation:tBoxPulse 2s ease-in-out infinite;}
@keyframes tBoxPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
.t-box h1{color:#fbd000;font-size:clamp(.7rem,3.5vw,1.1rem);line-height:2.2;text-shadow:2px 2px 0 #a07000;}
.t-box p{color:#fff;font-size:clamp(.4rem,2vw,.55rem);margin-top:4px;}
#music-btn{position:absolute;top:10px;right:12px;font-family:‘Press Start 2P’,monospace;background:rgba(0,0,0,.4);color:#fff;border:2px solid #fff;font-size:.4rem;padding:6px 10px;cursor:pointer;}

/* ======== BUTTONS ======== */
.btn{font-family:‘Press Start 2P’,monospace;border:none;cursor:pointer;margin:5px;padding:13px 26px;font-size:clamp(.48rem,2.4vw,.72rem);touch-action:manipulation;position:relative;}
.by{background:#fbd000;color:#1a0a00;border-bottom:4px solid #a07000;border-right:4px solid #a07000;animation:btnGlow 1.5s ease-in-out infinite;}
@keyframes btnGlow{0%,100%{box-shadow:0 0 0 #fbd000}50%{box-shadow:0 0 24px #fbd000}}
.br{background:#e52b2b;color:#fff;border-bottom:4px solid #8b0000;border-right:4px solid #8b0000;}
.bg{background:#2ecc40;color:#fff;border-bottom:4px solid #1a7a28;border-right:4px solid #1a7a28;}
.bgr{background:#888;color:#fff;border-bottom:4px solid #444;border-right:4px solid #444;}
.btn:active{transform:translate(2px,2px);}

/* ======== GAME ======== */
#game{display:none;}
#game.on{display:block;position:fixed;inset:0;width:100%;height:100dvh;}
#game.shake{animation:shake .3s;}
@keyframes shake{0%,100%{transform:translate(0,0)}25%{transform:translate(-6px,-3px)}50%{transform:translate(6px,3px)}75%{transform:translate(-3px,6px)}}

/* World backgrounds */
#bg{position:absolute;inset:0;z-index:0;transition:background 0.8s;}
#bg.w0{background:linear-gradient(180deg,#5c94fc 65%,#5a8a3c 65%,#5a8a3c 72%,#8B4513 72%);}
#bg.w1{background:linear-gradient(180deg,#fb923c 60%,#f97316 75%,#fbbf24 75%,#d97706 82%,#7c2d12 82%);} /* desert */
#bg.w2{background:linear-gradient(180deg,#0c4a6e 50%,#0369a1 70%,#075985 80%,#0c4a6e 88%,#1e3a8a 88%);} /* underwater */
#bg.w3{background:linear-gradient(180deg,#1f2937 50%,#374151 65%,#7c2d12 75%,#991b1b 85%,#450a0a 92%);} /* castle/lava */

#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(0,0,0,.7);z-index:10;border-bottom:2px solid #fbd000;}
#hud-left,#hud-right{display:flex;gap:12px;align-items:center;}
.hud-stat{display:flex;flex-direction:column;align-items:center;}
.hud-stat-label{color:#fff;font-size:clamp(.28rem,1.3vw,.4rem);}
.hud-stat-val{color:#fbd000;font-size:clamp(.5rem,2.2vw,.75rem);text-shadow:2px 2px 0 #c84c0c;}
#world-display{color:#fff;font-size:clamp(.32rem,1.6vw,.5rem);}
#combo-display{position:absolute;top:8px;left:50%;transform:translateX(-50%);color:#fbd000;font-size:clamp(.4rem,2vw,.55rem);text-shadow:2px 2px 0 #e52b2b;display:none;animation:comboBounce .5s ease;}
@keyframes comboBounce{0%{transform:translateX(-50%) scale(0)}50%{transform:translateX(-50%) scale(1.4)}100%{transform:translateX(-50%) scale(1)}}
#mbtn{font-family:‘Press Start 2P’,monospace;background:transparent;color:#fff;border:2px solid #fff;font-size:clamp(.28rem,1.3vw,.4rem);padding:5px 9px;cursor:pointer;}

#stage{position:absolute;top:50px;left:0;right:0;bottom:0;overflow:hidden;}
.sc{position:absolute;top:8%;font-size:2.5rem;pointer-events:none;opacity:.85;}
#sc1{left:10%;animation:cf 12s ease-in-out infinite alternate;}
#sc2{left:55%;font-size:1.8rem;animation:cf 18s ease-in-out infinite alternate 3s;}

/* Background enemies walking */
.bg-enemy{position:absolute;bottom:30%;font-size:1.5rem;pointer-events:none;animation:bgWalk 22s linear infinite;opacity:.85;}
@keyframes bgWalk{0%{left:-10%;transform:scaleX(1)}49.5%{left:110%;transform:scaleX(1)}50%{left:110%;transform:scaleX(-1)}99.5%{left:-10%;transform:scaleX(-1)}100%{left:-10%;transform:scaleX(1)}}
#bge1{animation-duration:24s;animation-delay:-3s;}
#bge2{animation-duration:30s;animation-delay:-12s;font-size:1.2rem;opacity:.6;}

.ground{position:absolute;bottom:0;left:0;right:0;height:28%;background:repeating-linear-gradient(90deg,#c84c0c 0,#c84c0c 48px,#a03a08 48px,#a03a08 50px);border-top:4px solid #e86010;}
.ground.w1{background:repeating-linear-gradient(90deg,#d97706 0,#d97706 48px,#92400e 48px,#92400e 50px);border-top:4px solid #fbbf24;}
.ground.w2{background:repeating-linear-gradient(90deg,#0c4a6e 0,#0c4a6e 48px,#075985 48px,#075985 50px);border-top:4px solid #38bdf8;}
.ground.w3{background:repeating-linear-gradient(90deg,#450a0a 0,#450a0a 48px,#7c2d12 48px,#7c2d12 50px);border-top:4px solid #fbbf24;}

/* ======== CHARACTER ======== */
#cw{position:absolute;bottom:30%;left:-180px;display:flex;flex-direction:column;align-items:center;z-index:5;transition:bottom 0.4s;}
#cs{width:140px;height:160px;display:flex;align-items:flex-end;justify-content:center;}
#cs svg{width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;shape-rendering:crispEdges;}
#cs.big{width:160px;height:210px;}
#cs.fire{filter:drop-shadow(0 0 8px #fff);}
#cs.invincible{animation:invFlash .12s steps(2) infinite;}
@keyframes invFlash{50%{filter:hue-rotate(120deg) brightness(1.4);}}
.idle-bounce svg{animation:idleBounce 1.2s ease-in-out infinite;}
@keyframes idleBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.celebrate svg{animation:celebrate .35s ease infinite;}
@keyframes celebrate{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-22px) rotate(-10deg)}75%{transform:translateY(-22px) rotate(10deg)}}
.jump-stomp svg{animation:jumpStomp .6s ease-out;}
@keyframes jumpStomp{0%{transform:translate(0,0)}40%{transform:translate(60px,-100px)}60%{transform:translate(80px,-30px)}100%{transform:translate(80px,0)}}

/* ======== POSTER (word display) ======== */
#poster{background:#fff;border:5px solid #222;box-shadow:3px 3px 0 #000;padding:10px 18px;margin-bottom:10px;text-align:center;position:relative;min-width:120px;display:none;animation:posterWiggle 2s ease-in-out infinite;}
@keyframes posterWiggle{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
#poster::after{content:’’;position:absolute;bottom:-13px;left:50%;transform:translateX(-50%);width:4px;height:13px;background:#555;}
#pw{font-family:‘Fredoka One’,cursive;font-size:clamp(2rem,9vw,3.5rem);color:#1a0a00;line-height:1;}

/* ======== ?-BLOCK ======== */
#qblock{position:absolute;top:18%;left:50%;transform:translateX(-50%);width:90px;height:90px;display:none;z-index:6;animation:qBob 1.2s ease-in-out infinite;}
@keyframes qBob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}
#qblock.hit{animation:qHit .35s ease;}
@keyframes qHit{0%{transform:translateX(-50%) translateY(0)}40%{transform:translateX(-50%) translateY(-30px)}100%{transform:translateX(-50%) translateY(0)}}
#qblock svg{width:100%;height:100%;image-rendering:pixelated;}

/* ======== SENTENCE FLASH ======== */
#sflash{position:absolute;top:35%;left:50%;transform:translateX(-50%);background:#fbd000;border:4px solid #1a0a00;padding:14px 24px;border-radius:10px;font-family:‘Fredoka One’,cursive;font-size:clamp(1.2rem,5vw,1.8rem);color:#1a0a00;display:none;z-index:30;box-shadow:4px 4px 0 #000;text-align:center;animation:sFlash 1.6s ease forwards;}
@keyframes sFlash{0%{opacity:0;transform:translateX(-50%) scale(.5)}20%{opacity:1;transform:translateX(-50%) scale(1.1)}80%{opacity:1;transform:translateX(-50%) scale(1)}100%{opacity:0;transform:translateX(-50%) scale(1)}}

/* ======== DIALOGUE ======== */
#dlg{background:#fff;border:3px solid #1a0a00;border-radius:12px;padding:8px 12px;font-size:clamp(.4rem,1.8vw,.55rem);color:#1a0a00;position:absolute;top:-62px;left:50%;transform:translateX(-10%);white-space:nowrap;display:none;z-index:10;box-shadow:2px 2px 0 #000;}
#dlg::after{content:’’;position:absolute;bottom:-9px;left:18px;border:5px solid transparent;border-top-color:#1a0a00;}

/* ======== HEARD FEEDBACK ======== */
#heard{position:absolute;bottom:42%;left:50%;transform:translateX(-50%);background:#222;border:2px solid #fbd000;border-radius:8px;padding:6px 10px;font-size:.45rem;color:#fbd000;display:none;z-index:9;white-space:nowrap;}

/* ======== MIC ======== */
#mic-area{position:absolute;bottom:14%;left:50%;transform:translateX(-50%);text-align:center;z-index:8;display:none;flex-direction:column;align-items:center;}
#micbtn{font-size:2.6rem;border:none;border-radius:50%;width:84px;height:84px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
#micbtn.idle{background:#fbd000;box-shadow:0 4px 0 #a07000,0 0 30px rgba(251,208,0,.6);animation:micBeckon 1.2s ease-in-out infinite;}
@keyframes micBeckon{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
#micbtn.live{background:#e52b2b;box-shadow:0 4px 0 #8b0000;animation:mp .5s ease-in-out infinite;}
@keyframes mp{0%,100%{box-shadow:0 4px 0 #8b0000,0 0 0 0 rgba(229,43,43,.6)}50%{box-shadow:0 4px 0 #8b0000,0 0 0 22px rgba(229,43,43,0)}}
#mic-lbl{color:#fff;font-size:clamp(.45rem,2vw,.6rem);margin-top:8px;text-shadow:1px 1px 0 #000;background:rgba(0,0,0,.55);padding:4px 8px;border-radius:4px;}
#mic-countdown{position:absolute;top:-32px;left:50%;transform:translateX(-50%);font-size:1.1rem;color:#fbd000;text-shadow:2px 2px 0 #000;display:none;}
#waves{display:none;align-items:flex-end;justify-content:center;gap:3px;height:20px;margin-top:6px;}
.wb{width:4px;background:#fbd000;border-radius:2px;transition:height .12s;}

/* ======== GOOMBA STOMP ======== */
#goomba{position:absolute;bottom:30%;right:-80px;width:60px;height:60px;display:none;z-index:5;}
#goomba svg{width:100%;height:100%;image-rendering:pixelated;}
#goomba.walking-in{animation:gWalkIn .8s linear forwards;}
@keyframes gWalkIn{0%{right:-80px}100%{right:35%}}
#goomba.squish{animation:gSquish .25s ease-out forwards;}
@keyframes gSquish{0%{transform:scaleY(1)}100%{transform:scaleY(.25);opacity:0}}

/* ======== FLOATING COIN AFTER STOMP ======== */
.coin-pop{position:absolute;width:40px;height:40px;z-index:25;pointer-events:none;}
.coin-pop svg{width:100%;height:100%;image-rendering:pixelated;}

/* ======== POWER-UP ======== */
#powerup-flash{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:35;pointer-events:none;display:none;}
#powerup-flash svg{width:30%;height:30%;}
.pu-text{position:absolute;top:38%;left:50%;transform:translateX(-50%);background:linear-gradient(180deg,#fbd000,#e52b2b);color:#fff;font-size:clamp(.9rem,4vw,1.3rem);padding:14px 24px;border:4px solid #fff;border-radius:12px;text-shadow:2px 2px 0 #000;box-shadow:0 0 30px #fbd000,4px 4px 0 #000;}

/* ======== SCORE POP ======== */
.spop{position:absolute;color:#fbd000;font-size:1.6rem;font-family:‘Press Start 2P’,monospace;pointer-events:none;animation:sp 1.2s ease forwards;z-index:25;text-shadow:3px 3px 0 #c84c0c,5px 5px 0 #000;}
@keyframes sp{0%{opacity:0;transform:translateY(0) scale(.5)}20%{opacity:1;transform:translateY(-20px) scale(1.5)}100%{opacity:0;transform:translateY(-100px) scale(1.8)}}

/* ======== PARTICLES ======== */
.particle{position:absolute;pointer-events:none;font-size:1.4rem;z-index:24;}

/* ======== MILESTONE / WORLD BANNER ======== */
#milestone{position:absolute;top:30%;left:0;right:0;text-align:center;z-index:30;display:none;pointer-events:none;}
#milestone .m-text{display:inline-block;background:linear-gradient(180deg,#fbd000,#e52b2b);color:#fff;font-size:clamp(1rem,5vw,1.5rem);padding:16px 30px;border:4px solid #fff;border-radius:12px;box-shadow:0 0 30px #fbd000,4px 4px 0 #000;text-shadow:2px 2px 0 #000;animation:mShow 2.5s ease forwards;}
@keyframes mShow{0%{transform:scale(0) rotate(-30deg)}15%{transform:scale(1.3) rotate(10deg)}30%{transform:scale(1) rotate(-3deg)}70%{transform:scale(1) rotate(3deg);opacity:1}100%{transform:scale(1.5) rotate(0deg);opacity:0}}

/* ======== END SESSION SUMMARY ======== */
#summary{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:60;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
#summary.on{display:flex;}
.sumbox{background:#1a0a00;border:4px solid #fbd000;padding:20px;max-width:90vw;max-height:90vh;overflow-y:auto;text-align:center;box-shadow:6px 6px 0 #fbd000;}
.sumbox h2{color:#fbd000;font-size:clamp(.7rem,3.5vw,1rem);margin-bottom:14px;text-shadow:2px 2px 0 #e52b2b;}
.sumbox .stat-line{color:#fff;font-size:clamp(.5rem,2.4vw,.7rem);margin:8px 0;}
.sumbox .stat-line span{color:#fbd000;}
.word-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(70px,1fr));gap:6px;margin:14px 0;max-height:200px;overflow-y:auto;}
.word-grid div{background:#2ecc40;color:#fff;padding:6px 4px;font-size:clamp(.4rem,2vw,.55rem);border-radius:4px;}
.word-grid div.miss{background:#e52b2b;}

/* ======== MENU ======== */
#menu{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;}
#menu.on{display:flex;}
.mbox{background:#1a0a00;border:4px solid #fbd000;padding:24px;min-width:280px;max-width:90vw;max-height:90vh;overflow-y:auto;box-shadow:6px 6px 0 #fbd000;text-align:center;}
.mbox h2{color:#fbd000;font-size:clamp(.6rem,3vw,.9rem);margin-bottom:20px;}
.mbox .btn{display:block;width:100%;margin:7px 0;}
#wlist{max-height:38vh;overflow-y:auto;background:#111;border:2px solid #555;padding:8px;margin:10px 0;text-align:left;}
.wr{display:flex;justify-content:space-between;align-items:center;padding:5px 4px;border-bottom:1px solid #333;font-size:clamp(.32rem,1.6vw,.46rem);}
.wr.on{color:#fff;}.wr.off{color:#666;}
.wtog{font-family:‘Press Start 2P’,monospace;border:none;padding:3px 7px;font-size:.35rem;cursor:pointer;}
.wtog.on{background:#2ecc40;color:#fff;}.wtog.off{background:#555;color:#fff;}
#wadd{display:flex;gap:6px;margin-top:8px;}
#winput{font-family:‘Press Start 2P’,monospace;background:#222;border:2px solid #555;color:#fff;padding:6px;font-size:.45rem;flex:1;text-transform:lowercase;}
</style>

</head>
<body>

<div id="tap">
  <div class="tap-hand">👆</div>
  <h2>MARIO<br>SIGHT WORDS</h2>
  <p>TAP TO START</p>
</div>

<div id="title" class="screen">
  <div class="t-coins" id="t-coins"></div>
  <div class="clouds"><span class="cl">☁️</span><span class="cl">☁️</span><span class="cl">☁️</span></div>
  <div class="t-mario" id="t-mario"></div>
  <div class="t-box">
    <h1>MARIO<br>SIGHT WORDS</h1>
    <p>Learn to Read!</p>
  </div>
  <button class="btn by" id="startbtn">▶ START GAME</button>
  <button class="btn bgr" id="settingsbtn">⚙ SETTINGS</button>
  <div style="color:#fff;font-size:.35rem;margin-top:14px;opacity:.8">🪙 COINS: <span id="tc">0</span></div>
  <button id="music-btn">🎵 ON</button>
</div>

<div id="game">
  <div id="bg" class="w0"></div>
  <div id="hud">
    <div id="hud-left">
      <div class="hud-stat"><div class="hud-stat-label">COINS</div><div class="hud-stat-val" id="hud-score">000</div></div>
      <div id="world-display">WORLD 1-1</div>
    </div>
    <div id="combo-display"></div>
    <button id="mbtn">MENU</button>
  </div>
  <div id="stage">
    <span class="sc" id="sc1">☁️</span>
    <span class="sc" id="sc2">☁️</span>
    <span class="bg-enemy" id="bge1">🐢</span>
    <span class="bg-enemy" id="bge2">🐛</span>
    <div id="qblock"></div>
    <div id="cw">
      <div id="dlg"></div>
      <div id="poster"><div id="pw"></div></div>
      <div id="cs"></div>
    </div>
    <div id="goomba"></div>
    <div id="heard"></div>
    <div id="sflash"></div>
    <div id="mic-area">
      <div id="mic-countdown"></div>
      <button id="micbtn" class="idle">🎤</button>
      <div id="mic-lbl">TAP TO SPEAK</div>
      <div id="waves">
        <div class="wb" style="height:8px"></div><div class="wb" style="height:14px"></div>
        <div class="wb" style="height:20px"></div><div class="wb" style="height:14px"></div>
        <div class="wb" style="height:8px"></div>
      </div>
    </div>
    <div class="ground" id="ground"></div>
    <div id="powerup-flash"></div>
    <div id="milestone"><span class="m-text" id="milestone-text"></span></div>
  </div>
</div>

<div id="summary">
  <div class="sumbox">
    <h2>⭐ GREAT JOB! ⭐</h2>
    <div class="stat-line">Coins this round: <span id="sum-coins">0</span></div>
    <div class="stat-line">Words read: <span id="sum-correct">0</span></div>
    <div class="stat-line">Best streak: <span id="sum-streak">0</span></div>
    <div class="word-grid" id="sum-words"></div>
    <button class="btn by" id="sum-continue">▶ KEEP PLAYING</button>
    <button class="btn bgr" id="sum-title">🏠 TITLE</button>
  </div>
</div>

<div id="menu">
  <div class="mbox">
    <h2>⭐ MENU ⭐</h2>
    <div id="mmain">
      <button class="btn by" id="resumebtn">▶ RESUME</button>
      <button class="btn bg" id="costumebtn">👕 COSTUMES</button>
      <button class="btn br" id="restartbtn">↺ RESTART</button>
      <button class="btn bg" id="wordsbtn">📝 MANAGE WORDS</button>
      <button class="btn bgr" id="titlebtn">🏠 TITLE</button>
    </div>
    <div id="mwords" style="display:none">
      <button class="btn bgr" id="backbtn" style="font-size:.4rem;padding:8px 12px;margin-bottom:10px">← BACK</button>
      <div id="wlist"></div>

var actx=null;
function unlockAudio(){
  if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();
  var b=actx.createBuffer(1,1,22050),s=actx.createBufferSource();
  s.buffer=b;s.connect(actx.destination);s.start(0);
}
function resume(){if(actx&&actx.state==='suspended')actx.resume();}
function tone(f,type,dur,vol,delay){
  if(!actx)return;resume();
  var t=actx.currentTime+(delay||0);
  var o=actx.createOscillator(),g=actx.createGain();
  o.connect(g);g.connect(actx.destination);
  o.type=type||'square';o.frequency.value=f;
  g.gain.setValueAtTime(vol||0.2,t);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t);o.stop(t+dur+0.01);
}
function noise(dur,vol,delay){
  if(!actx)return;resume();
  var t=actx.currentTime+(delay||0);
  var b=actx.createBuffer(1,actx.sampleRate*dur,actx.sampleRate);
  var d=b.getChannelData(0);
  for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
  var s=actx.createBufferSource();s.buffer=b;
  var g=actx.createGain();g.gain.value=vol||0.15;
  s.connect(g);g.connect(actx.destination);s.start(t);
}
function sfx(type){
  if(!actx)return;
  if(type==='coin'){tone(988,'square',.08,.32);tone(1319,'square',.3,.32,.08);}
  else if(type==='powerup'){[523,659,784,1047,1319].forEach(function(f,i){tone(f,'square',.13,.25,i*.07);});}
  else if(type==='1up'){[523,659,784,1047,1319,1568].forEach(function(f,i){tone(f,'square',.1,.22,i*.06);});}
  else if(type==='error'){tone(220,'sawtooth',.15,.3);tone(110,'sawtooth',.25,.25,.13);}
  else if(type==='thud'){tone(110,'square',.2,.3);noise(.15,.1);}
  else if(type==='stomp'){tone(80,'square',.12,.3);noise(.08,.2);tone(523,'square',.05,.2,.05);}
  else if(type==='qhit'){tone(880,'square',.05,.25);tone(1100,'square',.06,.22,.05);}
  else if(type==='walk'){tone(180,'square',.04,.06);}
  else if(type==='pop'){tone(660,'sine',.06,.2);tone(880,'sine',.08,.18,.04);}
  else if(type==='jump'){tone(523,'square',.05,.2);tone(784,'square',.08,.2,.05);tone(1047,'square',.1,.18,.13);}
}

// ======================================
// MUSIC — Layered chiptune that builds
// ======================================
var MELODY = [
  [72,1],[76,1],[79,1],[84,2],[81,1],[79,1],[76,2],
  [74,1],[77,1],[81,1],[86,2],[84,1],[81,1],[79,2],
  [76,1],[79,1],[83,1],[88,2],[86,1],[83,1],[79,2],
  [72,1],[76,1],[79,1],[84,1],[83,1],[79,1],[76,1],[72,2]
];
var BASS = [
  [48,4],[53,4],[55,4],[48,4],
  [50,4],[55,4],[57,4],[50,4],
  [52,4],[57,4],[59,4],[52,4],
  [48,4],[53,4],[55,4],[48,4]
];
var BEAT=0.115,mtmr=null,mplaying=false;
function mhz(m){return 440*Math.pow(2,(m-69)/12);}
function startMusic(){if(mplaying||!actx)return;mplaying=true;sched();}
function sched(){
  if(!mplaying)return;resume();
  var t0=actx.currentTime+0.05,t=t0,total=0;
  MELODY.forEach(function(n){
    if(n[0]>0){
      var o=actx.createOscillator(),g=actx.createGain();
      o.connect(g);g.connect(actx.destination);o.type='square';o.frequency.value=mhz(n[0]);
      var d=n[1]*BEAT*.85;g.gain.setValueAtTime(.07,t);g.gain.exponentialRampToValueAtTime(.0001,t+d);
      o.start(t);o.stop(t+d+.02);
    }
    t+=n[1]*BEAT;total+=n[1];
  });
  t=t0;
  BASS.forEach(function(n){
    if(n[0]>0){
      var o=actx.createOscillator(),g=actx.createGain();
      o.connect(g);g.connect(actx.destination);o.type='triangle';o.frequency.value=mhz(n[0]);
      var d=n[1]*BEAT*.9;g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.0001,t+d);
      o.start(t);o.stop(t+d+.02);
    }
    t+=n[1]*BEAT;
  });
  if(score>0){
    t=t0;
    for(var i=0;i<total;i++){
      var ko=actx.createOscillator(),kg=actx.createGain();
      ko.connect(kg);kg.connect(actx.destination);ko.type='sine';
      ko.frequency.setValueAtTime(120,t);ko.frequency.exponentialRampToValueAtTime(40,t+.1);
      kg.gain.setValueAtTime(.18,t);kg.gain.exponentialRampToValueAtTime(.001,t+.12);
      ko.start(t);ko.stop(t+.13);
      if(i%2===1 && score>=3){
        var b=actx.createBuffer(1,actx.sampleRate*.04,actx.sampleRate);
        var d=b.getChannelData(0);
        for(var j=0;j<d.length;j++)d[j]=(Math.random()*2-1)*(1-j/d.length);
        var s=actx.createBufferSource();s.buffer=b;
        var hg=actx.createGain();hg.gain.value=.06;
        s.connect(hg);hg.connect(actx.destination);s.start(t+BEAT*.5);
      }
      t+=BEAT;
    }
  }
  mtmr=setTimeout(function(){sched();},total*BEAT*1000+30);
}
function stopMusic(){mplaying=false;clearTimeout(mtmr);}

var FANFARE=[[60,1],[64,1],[67,1],[72,2],[71,1],[72,3],[0,1],[64,1],[67,1],[72,1],[76,2],[72,1],[74,1],[76,4]];
function playFanfare(){
  if(!actx)return;resume();
  var wasPlaying=mplaying;if(wasPlaying)stopMusic();
  var t=actx.currentTime+0.05;
  FANFARE.forEach(function(n){
    if(n[0]>0){
      var o=actx.createOscillator(),g=actx.createGain();
      o.connect(g);g.connect(actx.destination);o.type='square';o.frequency.value=mhz(n[0]);
      var d=n[1]*0.16*.92;g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.0001,t+d);
      o.start(t);o.stop(t+d+.02);
      var h=actx.createOscillator(),hg=actx.createGain();
      h.connect(hg);hg.connect(actx.destination);h.type='square';h.frequency.value=mhz(n[0]+7);
      hg.gain.setValueAtTime(.10,t);hg.gain.exponentialRampToValueAtTime(.0001,t+d);
      h.start(t);h.stop(t+d+.02);
      var b=actx.createOscillator(),bg=actx.createGain();
      b.connect(bg);bg.connect(actx.destination);b.type='triangle';b.frequency.value=mhz(n[0]-12);
      bg.gain.setValueAtTime(.12,t);bg.gain.exponentialRampToValueAtTime(.0001,t+d);
      b.start(t);b.stop(t+d+.02);
    }
    t+=n[1]*0.16;
  });
  var totalSec=FANFARE.reduce(function(a,n){return a+n[1]*0.16;},0);
  if(wasPlaying){setTimeout(function(){if(musicOn)startMusic();},(totalSec+0.3)*1000);}
}

// ======================================
// WORDS — with spaced repetition
// ======================================
function sfl(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=b[i];b[i]=b[j];b[j]=t;}return b;}
function buildQ(){
  var words=active.slice();
  // Spaced repetition: words with misses get prioritized
  var weighted=[];
  words.forEach(function(w){
    var perf=wordPerformance[w]||{misses:0,hits:0};
    var weight=1+(perf.misses||0)*2;
    for(var k=0;k<weight;k++)weighted.push(w);
  });
  // Easy ones first
  var easy=sfl(EASY.filter(function(w){return active.indexOf(w)>-1;})).slice(0,3);
  var rest=sfl(weighted).filter(function(w){return easy.indexOf(w)===-1;});
  // dedupe
  var seen={},dedupedRest=[];
  rest.forEach(function(w){if(!seen[w]){seen[w]=true;dedupedRest.push(w);}});
  queue=easy.concat(dedupedRest);
}
function nw(){if(!queue.length)buildQ();word=queue.shift();attemptsThisWord=0;}

function $(id){return document.getElementById(id);}
function show(id){$(id).style.display='block';}
function hide(id){$(id).style.display='none';}
function showf(id){$(id).style.display='flex';}
function setScr(s){
  ['title'].forEach(function(id){$(id).classList.remove('on');});
  $('game').classList.remove('on');
  if(s==='game')$('game').classList.add('on');
  else $(s).classList.add('on');
}
function updScore(){
  $('hud-score').textContent=String(score).padStart(3,'0');
  $('tc').textContent=score;
  if(combo>=2){
    var c=$('combo-display');c.textContent='COMBO ×'+combo+'!';c.style.display='block';
    c.style.animation='none';void c.offsetWidth;c.style.animation='comboBounce .5s ease';
  } else $('combo-display').style.display='none';
  if(combo>bestCombo)bestCombo=combo;
  // World display
  var w=Math.min(Math.floor(score/10),WORLDS.length-1);
  $('world-display').textContent=WORLDS[w].name;
}

function getCostume(){
  for(var i=0;i<COSTUMES.length;i++){
    if(COSTUMES[i].id===currentCostume)return COSTUMES[i];
  }
  return COSTUMES[0];
}

function setSprite(frame){
  var c=getCostume();
  $('cs').innerHTML=smb3Sprite(c.palette,frame||0,c.extra);
}

function applyWorld(){
  var w=Math.min(Math.floor(score/10),WORLDS.length-1);
  $('bg').className=WORLDS[w].bg;
  $('ground').className='ground '+WORLDS[w].ground;
  $('bge1').textContent=WORLDS[w].enemies[0];
  $('bge2').textContent=WORLDS[w].enemies[1];
}

// ======================================
// GAME FLOW
// ======================================
function startGame(){
  resume();
  buildQ();
  updScore();
  applyWorld();
  setScr('game');
  phase='idle';
  sessionCorrect=0;sessionWords=[];sessionStartScore=score;bestCombo=combo;
  if(musicOn&&!mplaying)startMusic();
  setTimeout(spawn,400);
}

function spawn(){
  if(phase==='walking'||phase==='ending')return;
  phase='walking';nw();
  
  // Show sentence flash first (educational moment)
  showSentence(word, function(){
    actuallySpawn();
  });
}

function actuallySpawn(){
  setSprite(0);
  $('pw').textContent=word.toUpperCase();
  hide('poster');hide('mic-area');hide('dlg');hide('heard');hide('qblock');
  $('qblock').classList.remove('hit');
  
  var cw=$('cw');cw.style.transition='none';cw.style.left='-180px';
  cw.style.bottom='30%';
  // Ensure no power-up effects linger
  $('cs').classList.remove('big','fire','invincible','idle-bounce','celebrate','jump-stomp');
  void cw.offsetWidth;
  
  // Walking animation — alternate frames every 180ms
  startWalkAnim();
  
  cw.style.transition='left 0.7s cubic-bezier(0.4,0,0.2,1)';
  cw.style.left=Math.round(window.innerWidth*.12)+'px';
  // walk steps
  var stepCnt=0,stepTmr=setInterval(function(){if(stepCnt++>3){clearInterval(stepTmr);return;}sfx('walk');},170);
  
  setTimeout(function(){
    stopWalkAnim();
    setSprite(0);
    $('cs').classList.add('idle-bounce');
    // Show ?-block above character
    showQBlock();
    show('poster');showf('mic-area');
    phase='listening';
    sfx('pop');
  },800);
}

function startWalkAnim(){
  $('cs').classList.remove('idle-bounce');
  walkFrame=1;setSprite(1);
  walkTmr=setInterval(function(){
    walkFrame=walkFrame===1?2:1;setSprite(walkFrame);
  },180);
}
function stopWalkAnim(){
  if(walkTmr){clearInterval(walkTmr);walkTmr=null;}
}

function showQBlock(){
  $('qblock').innerHTML=SVG_QBLOCK;
  show('qblock');
}

// Show a brief sentence context flash before each word
function showSentence(w, cb){
  var s=SENTENCES[w];
  if(!s){cb();return;}
  var f=$('sflash');
  f.textContent=s;
  f.style.display='block';
  f.style.animation='none';void f.offsetWidth;f.style.animation='sFlash 1.6s ease forwards';
  setTimeout(function(){f.style.display='none';cb();},1700);
}

function correct(){
  if(phase!=='listening')return;
  phase='answered';
  stopListen();
  sfx('powerup');
  showDlg('Yes! 🌟');
  hide('mic-area');
  
  // Track session
  sessionCorrect++;
  sessionWords.push({w:word,ok:true});
  if(!wordPerformance[word])wordPerformance[word]={hits:0,misses:0};
  wordPerformance[word].hits++;
  
  // ?-block hit animation
  $('qblock').classList.add('hit');
  setTimeout(function(){
    $('qblock').innerHTML=SVG_QBLOCK_USED;
    sfx('qhit');
  },200);
  
  // Word leaps off poster (visual flair)
  var pw=$('pw');pw.style.transition='transform .4s';pw.style.transform='scale(1.5) translateY(-30px) rotate(15deg)';
  setTimeout(function(){pw.style.transform='';},600);
  
  // Goomba walks in to be stomped
  setTimeout(function(){spawnGoomba();},700);
}

function spawnGoomba(){
  var g=$('goomba');
  g.innerHTML=SVG_GOOMBA;
  g.style.display='block';
  g.style.right='-80px';
  g.classList.remove('squish','walking-in');
  void g.offsetWidth;
  g.classList.add('walking-in');
  
  setTimeout(function(){stompGoomba();},800);
}

function stompGoomba(){
  // Mario jumps and stomps
  $('cs').classList.remove('idle-bounce');
  $('cs').classList.add('jump-stomp');
  sfx('jump');
  
  setTimeout(function(){
    sfx('stomp');
    var g=$('goomba');
    g.classList.add('squish');
    shake();
    // Coin pops out
    setTimeout(function(){
      g.style.display='none';
      coinPop();
      score++;combo++;save();updScore();
      sfx('coin');
      
      // Power-up checks based on combo
      checkPowerUps();
      
      // Milestone every 10 coins
      if(score%10===0){
        setTimeout(function(){
          playFanfare();
          showMilestone('★ WORLD '+(Math.floor(score/10)+1)+'-1! ★');
          applyWorld();
        },500);
      }
      
      // End round after a beat
      setTimeout(endRound,1400);
    },200);
  },300);
}

function coinPop(){
  var stage=$('stage');
  // The coin pops out where the goomba was
  var p=document.createElement('div');p.className='coin-pop';p.innerHTML=SVG_COIN;
  p.style.right='38%';p.style.bottom='35%';
  stage.appendChild(p);
  p.animate([
    {transform:'translateY(0) scale(1)',opacity:1},
    {transform:'translateY(-150px) scale(1.5)',opacity:1,offset:.5},
    {transform:'translateY(-100px) scale(1.5)',opacity:0}
  ],{duration:1100,fill:'forwards'});
  setTimeout(function(){p.remove();},1150);
  
  // Score pop
  var sp=document.createElement('div');sp.className='spop';sp.textContent='+1';
  sp.style.right='40%';sp.style.top='25%';stage.appendChild(sp);
  setTimeout(function(){sp.remove();},1200);
}

function checkPowerUps(){
  if(combo===3){
    showPowerUp(SVG_MUSHROOM,'SUPER!');
    $('cs').classList.add('big');
    sfx('powerup');
  } else if(combo===5){
    showPowerUp(SVG_FIRE,'FIRE POWER!');
    $('cs').classList.add('fire');
    sfx('powerup');
  } else if(combo===10){
    showPowerUp(SVG_STAR,'STAR POWER!');
    $('cs').classList.add('invincible');
    sfx('1up');
  }
}
function showPowerUp(svgArt,txt){
  var pf=$('powerup-flash');
  pf.innerHTML=svgArt+'<div class="pu-text">'+txt+'</div>';
  pf.style.display='flex';
  setTimeout(function(){pf.style.display='none';},1800);
}

function wrong(){
  if(phase!=='listening')return;
  attemptsThisWord++;
  combo=0;
  if(!wordPerformance[word])wordPerformance[word]={hits:0,misses:0};
  wordPerformance[word].misses++;
  save();updScore();
  sfx('error');
  if(attemptsThisWord>=2){
    showDlg('Word: "'+word.toUpperCase()+'" — try again!');
  } else {
    showDlg('Try again! 😊');
  }
  setTimeout(hideDlg,2500);
}

function endRound(){
  phase='ending';
  // Walk out
  hide('poster');hide('mic-area');hide('dlg');hide('qblock');
  startWalkAnim();
  var cw=$('cw');cw.style.transition='left 0.8s ease-in';cw.style.left='-200px';
  setTimeout(function(){
    stopWalkAnim();
    cw.style.transition='none';cw.style.left='-180px';
    // Clear power-ups after round
    $('cs').classList.remove('big','fire','invincible','idle-bounce','celebrate','jump-stomp');
    setSprite(0);
    phase='idle';
    
    // After every 5 rounds, show summary
    if(sessionCorrect>0 && sessionCorrect%5===0){
      showSummary();
    } else {
      setTimeout(spawn,400);
    }
  },850);
}

function shake(){var g=$('game');g.classList.remove('shake');void g.offsetWidth;g.classList.add('shake');}

function showDlg(t){$('dlg').textContent=t;show('dlg');}
function hideDlg(){hide('dlg');}

function showMilestone(text){
  var m=$('milestone');$('milestone-text').textContent=text;m.style.display='block';
  spawnCoinParticles(40);
  setTimeout(function(){m.style.display='none';},2500);
}

function spawnCoinParticles(n){
  var stage=$('stage');
  for(var i=0;i<n;i++){(function(i){
    setTimeout(function(){
      var p=document.createElement('div');p.className='particle';p.innerHTML=SVG_COIN;
      var size=20+Math.random()*16;
      p.style.cssText='width:'+size+'px;height:'+size+'px;right:'+(8+Math.random()*60)+'%;bottom:'+(40+Math.random()*30)+'%;';
      stage.appendChild(p);
      var ang=(Math.random()-.5)*120,dist=80+Math.random()*120,dur=900+Math.random()*400;
      p.animate([
        {transform:'translate(0,0) rotate(0deg) scale(1)',opacity:1},
        {transform:'translate('+(Math.cos(ang*Math.PI/180)*dist)+'px,'+(-dist*1.2)+'px) rotate(720deg) scale(.5)',opacity:0}
      ],{duration:dur,easing:'cubic-bezier(.2,.8,.4,1)',fill:'forwards'});
      setTimeout(function(){p.remove();},dur+50);
    },i*30);
  })(i);}
}

function showSummary(){
  $('sum-coins').textContent=score-sessionStartScore;
  $('sum-correct').textContent=sessionCorrect;
  $('sum-streak').textContent=bestCombo;
  var grid=$('sum-words');grid.innerHTML='';
  // Last 10 words
  var recent=sessionWords.slice(-10);
  recent.forEach(function(w){
    var d=document.createElement('div');d.textContent=w.w;
    if(!w.ok)d.classList.add('miss');
    grid.appendChild(d);
  });
  $('summary').classList.add('on');
}

// ======================================
// MIC — 1 second listen window
// ======================================
function toggleMic(){
  if(phase!=='listening')return;resume();
  if(listening){if(rec)try{rec.abort();}catch(e){}return;}
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showDlg('Open in Safari!');return;}
  rec=new SR();rec.lang='en-US';rec.continuous=false;rec.interimResults=false;rec.maxAlternatives=8;
  rec.onstart=function(){listening=true;setMicUI(true);hide('heard');startMicCountdown();};
  rec.onend=function(){listening=false;setMicUI(false);stopMicCountdown();};
  rec.onerror=function(e){
    listening=false;setMicUI(false);stopMicCountdown();
    if(e.error==='no-speech')showHeard("Didn't catch that — tap again!");
  };
  rec.onresult=function(e){
    listening=false;setMicUI(false);stopMicCountdown();
    var alts=[];
    for(var i=0;i<e.results[0].length;i++)alts.push(e.results[0][i].transcript.trim().toLowerCase());
    showHeard('I heard: "'+alts[0]+'"');
    doCheck(alts);
  };
  rec.start();
  // Auto-stop after 1.5 second to keep things snappy
  setTimeout(function(){
    if(listening && rec){
      try{rec.stop();}catch(e){}
    }
  },1500);
}

var micCountdownTmr=null;
function startMicCountdown(){
  var el=$('mic-countdown');
  el.style.display='block';
  el.textContent='🎤';
}
function stopMicCountdown(){
  $('mic-countdown').style.display='none';
}

function showHeard(text){
  var h=$('heard');h.textContent=text;h.style.display='block';
  setTimeout(function(){if(h.textContent===text)hide('heard');},2500);
}
function stopListen(){if(rec){try{rec.abort();}catch(e){}}rec=null;listening=false;setMicUI(false);stopMicCountdown();}
function setMicUI(live){
  var b=$('micbtn');
  if(live){
    b.className='live';b.textContent='🔴';$('mic-lbl').textContent='LISTENING...';
    $('waves').style.display='flex';clearInterval(waveTmr);
    waveTmr=setInterval(function(){
      $('waves').querySelectorAll('.wb').forEach(function(wb){wb.style.height=(6+Math.floor(Math.random()*16))+'px';});
    },120);
  } else {
    b.className='idle';b.textContent='🎤';$('mic-lbl').textContent='TAP TO SPEAK';
    $('waves').style.display='none';clearInterval(waveTmr);
  }
}

// ======================================
// LENIENT MATCHING
// ======================================
function lev(a,b){
  if(a===b)return 0;
  if(!a.length)return b.length;
  if(!b.length)return a.length;
  var m=[];
  for(var i=0;i<=b.length;i++)m[i]=[i];
  for(var j=0;j<=a.length;j++)m[0][j]=j;
  for(i=1;i<=b.length;i++){for(j=1;j<=a.length;j++){
    if(b.charAt(i-1)===a.charAt(j-1))m[i][j]=m[i-1][j-1];
    else m[i][j]=Math.min(m[i-1][j-1]+1,m[i][j-1]+1,m[i-1][j]+1);
  }}
  return m[b.length][a.length];
}

var HOMOPHONES={
  'a':['ay','uh','eh'],
  'and':['an','en','ant','end'],
  'away':['aw','aweh','uh-way'],
  'big':['beg','bug'],
  'blue':['bloo','blu'],
  'can':['ken','kan'],
  'come':['cum','kum','kuhm'],
  'down':['dawn','dahn'],
  'find':['fynd','fine'],
  'for':['fer','fur','foe'],
  'funny':['funi','funee'],
  'go':['guh','gow','goe'],
  'help':['hep','halp'],
  'here':['hir','heer','hear'],
  'i':['eye','ai','ay'],
  'in':['en','ihn','inn'],
  'is':['iz','his','ess'],
  'it':['et','at','iht'],
  'jump':['jamp','jomp'],
  'little':['litl','liddle','lil'],
  'look':['luk','lok'],
  'make':['mak','mek'],
  'me':['mee','meh','mi'],
  'my':['mai','mie','mee'],
  'not':['nat','naht'],
  'one':['won','wun','one'],
  'play':['plei','plai'],
  'red':['rad','rred'],
  'run':['ron','rin'],
  'said':['sed','sehd'],
  'see':['si','sea','se'],
  'the':['da','duh','tha','de','they','thee'],
  'three':['tree','free','thre'],
  'to':['too','two','tu','duh'],
  'two':['too','to','tu'],
  'up':['op','app','uhp'],
  'we':['wee','weh'],
  'where':['wer','wair','were'],
  'yellow':['yelo','yelloh','yelow'],
  'you':['u','yu','ya','yoo']
};

function lenientMatch(target, heard){
  target=target.toLowerCase();heard=heard.toLowerCase();
  if(heard===target)return true;
  var words=heard.split(/\s+/);
  for(var i=0;i<words.length;i++){
    var w=words[i];if(!w)continue;
    if(w===target)return true;
    if(lev(w,target)<=1)return true;
    if(HOMOPHONES[target]&&HOMOPHONES[target].indexOf(w)>-1)return true;
    if(w.charAt(0)===target.charAt(0)&&Math.abs(w.length-target.length)<=2&&lev(w,target)<=2)return true;
    if(w.indexOf(target)>-1)return true;
    if(target.length<=3 && lev(w,target)<=2)return true; // Very short words: extra forgiving
  }
  return false;
}

function doCheck(alts){
  var t=word.toLowerCase();
  if(alts.some(function(a){return lenientMatch(t,a);})){correct();return;}
  // AI fallback
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:10,
      messages:[{role:'user',content:'A young child is trying to say "'+t+'". Mic heard: '+JSON.stringify(alts)+'. Be VERY lenient — if there is any reasonable chance the child was trying to say "'+t+'", say YES. Reply only YES or NO.'}]})
  }).then(function(r){return r.json();}).then(function(d){
    ((d.content&&d.content[0]&&d.content[0].text||'').trim().toUpperCase().indexOf('YES')===0)?correct():wrong();
  }).catch(function(){wrong();});
}

// ======================================
// MENU
// ======================================
function openMenu(from){
  fromTitle=(from==='title');stopListen();
  $('resumebtn').style.display=fromTitle?'none':'block';
  showSec('main');$('menu').classList.add('on');
}
function closeMenu(){$('menu').classList.remove('on');}
function showSec(s){
  $('mmain').style.display=s==='main'?'block':'none';
  $('mwords').style.display=s==='words'?'block':'none';
  $('mcostumes').style.display=s==='costumes'?'block':'none';
  if(s==='words')renderWords();
  if(s==='costumes')renderCostumes();
}
function renderWords(){
  var all=[],seen={};
  WORDS.concat(active).forEach(function(w){if(!seen[w]){seen[w]=true;all.push(w);}});
  all.sort();
  $('wlist').innerHTML=all.map(function(w){
    var on=active.indexOf(w)>-1;
    return '<div class="wr '+(on?'on':'off')+'"><span>'+w+'</span><button class="wtog '+(on?'on':'off')+'" onclick="togW(\''+w+'\',this)">'+(on?'ON':'OFF')+'</button></div>';
  }).join('');
}
function togW(w,b){
  var i=active.indexOf(w);
  if(i>-1){
    if(active.length<=3){alert('Need 3+');return;}
    active.splice(i,1);b.className='wtog off';b.textContent='OFF';b.parentElement.className='wr off';
  } else {
    active.push(w);b.className='wtog on';b.textContent='ON';b.parentElement.className='wr on';
  }
  save();buildQ();
}
function renderCostumes(){
  var grid=$('costume-grid');
  grid.innerHTML='';
  COSTUMES.forEach(function(c){
    var d=document.createElement('div');
    d.style.cssText='background:'+(currentCostume===c.id?'#fbd000':'#333')+';padding:8px;border-radius:6px;cursor:pointer;text-align:center;border:'+(currentCostume===c.id?'3px solid #e52b2b':'2px solid #555')+';';
    d.innerHTML='<div style="width:60px;height:80px;margin:0 auto;">'+smb3Sprite(c.palette,0,c.extra)+'</div><div style="color:'+(currentCostume===c.id?'#1a0a00':'#fff')+';font-size:.4rem;margin-top:4px">'+c.name+'</div>';
    d.onclick=function(){
      currentCostume=c.id;save();
      setSprite(0);
      renderCostumes();
    };
    grid.appendChild(d);
  });
}

    d.style.animationDelay=(Math.random()*4)+'s';

}

},{once:true});

  if(musicOn)startMusic();else stopMusic();
});

});

  setTimeout(spawn,400);
});
$('sum-title').addEventListener('click',function(){
  $('summary').classList.remove('on');
  setScr('title');updScore();makeTitleMario();
});
