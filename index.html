<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mario Sight Words</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Andika:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*,*:before,*:after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Andika',system-ui,sans-serif;color:#fff;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;touch-action:manipulation}
body{height:100dvh}
img,svg{image-rendering:pixelated;image-rendering:-moz-crisp-edges;image-rendering:crisp-edges;display:block}

#rotate-prompt{position:fixed;inset:0;background:#000;display:none;align-items:center;justify-content:center;z-index:9999;color:#fff;text-align:center;padding:20px;font-family:‘Press Start 2P’,monospace;font-size:14px;line-height:1.6}
@media (orientation:portrait){
#rotate-prompt{display:flex}
#app{display:none !important}
}
#rotate-icon{font-size:80px;margin-bottom:20px;animation:rotateBounce 1s ease-in-out infinite alternate}
@keyframes rotateBounce{from{transform:rotate(0deg)}to{transform:rotate(90deg)}}

#app{position:fixed;inset:0;display:flex;flex-direction:column;background:#5c94fc}

#title{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#5c94fc 0%,#5c94fc 75%,#00a800 75%,#00a800 100%);z-index:10}
#title.hide{display:none}
.title-mario{width:130px;height:auto;margin-bottom:14px;animation:bounce 0.5s ease-in-out infinite alternate;filter:drop-shadow(4px 4px 0 #000)}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}
.title-card{background:#000;border:4px solid #fbd000;border-radius:8px;padding:18px 36px;text-align:center;box-shadow:6px 6px 0 #d82800,12px 12px 0 #fbd000}
.title-card h1{font-family:‘Press Start 2P’,monospace;font-size:24px;color:#fbd000;text-shadow:3px 3px 0 #d82800;margin-bottom:6px;letter-spacing:2px}
.title-card p{font-family:‘Andika’,sans-serif;font-weight:700;font-size:18px;color:#fff;margin-top:8px}
.title-buttons{display:flex;gap:14px;margin-top:18px;align-items:center;justify-content:center}
.btn-primary{background:#fbd000;color:#000;border:3px solid #000;border-radius:6px;padding:10px 22px;font-family:‘Press Start 2P’,monospace;font-size:14px;cursor:pointer;box-shadow:3px 3px 0 #000;font-weight:bold;transition:transform 0.1s}
.btn-primary:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #000}
.btn-secondary{background:#aaa;color:#000;border:3px solid #000;border-radius:6px;padding:8px 16px;font-family:‘Press Start 2P’,monospace;font-size:11px;cursor:pointer;box-shadow:3px 3px 0 #000}
.btn-secondary:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #000}

#hud{position:absolute;top:0;left:0;right:0;height:40px;background:rgba(0,0,0,0.65);color:#fff;font-family:‘Press Start 2P’,monospace;font-size:11px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:5;border-bottom:2px solid #fbd000}
#coins-hud{display:flex;align-items:center;gap:6px}
#coins-icon{width:18px;height:18px}
#world-label{color:#fbd000}
#menu-btn{background:#fbd000;color:#000;border:2px solid #000;padding:4px 10px;font-family:‘Press Start 2P’,monospace;font-size:10px;border-radius:3px;cursor:pointer}

#stage{position:absolute;top:40px;left:0;right:0;bottom:0;overflow:hidden;background:#5c94fc}
#stage.world-w0{background:linear-gradient(180deg,#5c94fc 0%,#5c94fc 100%)}
#stage.world-w1{background:linear-gradient(180deg,#fcae66 0%,#fbd000 100%)}
#stage.world-w2{background:linear-gradient(180deg,#0078a8 0%,#003478 100%)}
#stage.world-w3{background:linear-gradient(180deg,#202020 0%,#480000 100%)}

#clouds-layer,#hills-layer,#bushes-layer,#ground-layer,#entities-layer,#fx-layer{position:absolute;left:0;right:0}
#clouds-layer{top:10px;height:80px;pointer-events:none}
#hills-layer{bottom:60px;height:80px;pointer-events:none}
#bushes-layer{bottom:60px;height:40px;pointer-events:none}
#ground-layer{bottom:0;height:60px;background-repeat:repeat-x}
#entities-layer{top:0;bottom:60px;pointer-events:none}
#fx-layer{top:0;bottom:0;pointer-events:none;z-index:8}

.cloud-sprite{position:absolute;width:96px;height:auto}
.hill-sprite{position:absolute;width:144px;height:auto}
.bush-sprite{position:absolute;width:96px;height:auto}

#mario{position:absolute;left:18%;bottom:60px;width:96px;height:auto;z-index:6;transition:transform 0.15s}
#mario.big{transform:scale(1.4);transform-origin:bottom center}
#mario.invinc{filter:drop-shadow(0 0 8px #fbd000)}
#mario.fire-power{filter:drop-shadow(0 0 6px rgba(255,255,255,0.9))}

#qblock{position:absolute;left:24%;top:24%;width:64px;height:64px;z-index:5;animation:qbounce 1.2s ease-in-out infinite}
@keyframes qbounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
#qblock.bumped{animation:qbump 0.4s ease-out}
@keyframes qbump{0%{transform:translateY(0)}40%{transform:translateY(-30px)}100%{transform:translateY(0)}}

#poster{position:absolute;left:36%;top:18%;background:#fff;border:5px solid #000;border-radius:8px;padding:14px 28px;box-shadow:5px 5px 0 #000;z-index:5;display:flex;align-items:center;justify-content:center;min-width:140px;min-height:60px}
#poster.flash-context{background:#fffbe0}
#poster .word{font-family:‘Andika’,sans-serif;font-weight:700;color:#000;font-size:48px;line-height:1;letter-spacing:1px}
#poster .sentence{font-family:‘Andika’,sans-serif;font-weight:400;color:#000;font-size:22px;line-height:1.2;text-align:center}

.goomba{position:absolute;width:64px;height:auto;z-index:6}
.goomba.walking{animation:goombaWalk 0.5s steps(2) infinite}
@keyframes goombaWalk{from{transform:scaleX(1)}to{transform:scaleX(-1)}}

#mic-wrap{position:absolute;right:5%;bottom:90px;z-index:7;display:flex;flex-direction:column;align-items:center;gap:8px}
#mic-btn{width:90px;height:90px;border-radius:50%;border:5px solid #000;background:radial-gradient(circle,#fbd000 0%,#f8b800 70%,#d09000 100%);color:#000;font-size:42px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(251,208,0,0.7),5px 5px 0 #000;animation:micPulse 1.5s ease-in-out infinite;font-family:‘Press Start 2P’,monospace}
#mic-btn:active{transform:translate(2px,2px);box-shadow:0 0 30px rgba(251,208,0,0.7),3px 3px 0 #000}
#mic-btn.listening{background:radial-gradient(circle,#ff4040 0%,#c00000 70%,#700000 100%);animation:micListen 0.6s ease-in-out infinite}
@keyframes micPulse{0%,100%{box-shadow:0 0 30px rgba(251,208,0,0.7),5px 5px 0 #000}50%{box-shadow:0 0 50px rgba(251,208,0,1),5px 5px 0 #000}}
@keyframes micListen{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
#mic-label{font-family:‘Press Start 2P’,monospace;font-size:10px;background:rgba(0,0,0,0.7);padding:4px 8px;border-radius:3px;border:2px solid #fbd000;color:#fff}
#mic-countdown{font-family:‘Press Start 2P’,monospace;font-size:14px;color:#fbd000;text-shadow:2px 2px 0 #000;margin-top:4px;display:none}
#mic-countdown.show{display:block}

#flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:9}
#flash.flash{animation:flashOnce 0.3s}
@keyframes flashOnce{0%{opacity:0}50%{opacity:0.8}100%{opacity:0}}
#shake.shake{animation:shake 0.4s}
@keyframes shake{0%,100%{transform:translate(0,0)}20%{transform:translate(-4px,2px)}40%{transform:translate(4px,-2px)}60%{transform:translate(-3px,3px)}80%{transform:translate(3px,-3px)}}

.coin-particle{position:absolute;width:24px;height:24px;z-index:9;animation:coinFly 1.2s ease-out forwards}
@keyframes coinFly{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-180px) translateX(var(–dx,0)) scale(0.5) rotate(720deg)}}

.score-pop{position:absolute;font-family:‘Press Start 2P’,monospace;font-size:24px;color:#fbd000;text-shadow:3px 3px 0 #000;z-index:9;pointer-events:none;animation:scorePop 1.2s ease-out forwards}
@keyframes scorePop{0%{opacity:0;transform:translateY(0) scale(0.5)}30%{opacity:1;transform:translateY(-30px) scale(1.2)}100%{opacity:0;transform:translateY(-100px) scale(1)}}

#dialog{position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.9);border:4px solid #fbd000;border-radius:10px;padding:18px 30px;font-family:‘Andika’,sans-serif;font-weight:700;font-size:22px;text-align:center;color:#fff;z-index:10;display:none;max-width:80%}
#dialog.show{display:block;animation:dialogPop 0.3s}
@keyframes dialogPop{from{transform:translate(-50%,-50%) scale(0.7);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}

#menu-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.85);z-index:50;display:none;align-items:center;justify-content:center;padding:20px}
#menu-overlay.show{display:flex}
.menu-panel{background:#000;border:4px solid #fbd000;border-radius:10px;padding:20px;max-width:90%;max-height:90%;overflow-y:auto;width:600px}
.menu-panel h2{font-family:‘Press Start 2P’,monospace;font-size:18px;color:#fbd000;text-align:center;margin-bottom:14px}
.menu-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:10px 0}
.menu-back{background:#aaa;color:#000;border:3px solid #000;padding:8px 14px;font-family:‘Press Start 2P’,monospace;font-size:11px;cursor:pointer;border-radius:3px;display:block;margin:14px auto 0;box-shadow:3px 3px 0 #000}

.costume-card{background:#222;border:3px solid #444;border-radius:6px;padding:8px;cursor:pointer;text-align:center;width:120px}
.costume-card.selected{border-color:#fbd000;background:#3a2c00;box-shadow:0 0 12px rgba(251,208,0,0.6)}
.costume-card svg{width:80px;height:auto;margin:0 auto}
.costume-card .name{font-family:‘Andika’,sans-serif;font-weight:700;font-size:13px;color:#fff;margin-top:4px}

.summary-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0;font-family:‘Andika’,sans-serif;font-weight:700;font-size:16px;color:#fff}
.summary-stats div{background:#1a1a1a;padding:8px;border-radius:4px;text-align:center;border:2px solid #444}
.summary-stats .num{display:block;font-size:28px;color:#fbd000;font-family:‘Press Start 2P’,monospace}
.word-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:10px 0;max-height:120px;overflow-y:auto;padding:4px}
.word-pill{padding:4px 10px;border-radius:14px;font-family:‘Andika’,sans-serif;font-weight:700;font-size:14px;border:2px solid #000}
.word-pill.correct{background:#00a800;color:#fff}
.word-pill.missed{background:#d82800;color:#fff}

#start-listen-tap{position:absolute;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff;font-family:‘Press Start 2P’,monospace;font-size:13px;text-align:center;padding:30px}
#start-listen-tap.hide{display:none}
#start-listen-tap p{margin:8px 0;line-height:1.5}
#start-listen-tap .pulse{font-size:32px;animation:bounce 0.5s ease-in-out infinite alternate;color:#fbd000;text-shadow:3px 3px 0 #d82800;margin-bottom:14px}

#music-toggle{position:absolute;top:8px;right:130px;background:rgba(0,0,0,0.7);color:#fff;border:2px solid #fbd000;padding:4px 8px;font-family:‘Press Start 2P’,monospace;font-size:10px;border-radius:3px;cursor:pointer;z-index:6}
</style>

</head>

function renderSprite(grid, palette){
  palette = palette || PALETTE;
  var h = grid.length, w = grid[0].length;
  var rects = '';
  for(var y=0;y<h;y++){
    for(var x=0;x<w;x++){
      var ch = grid[y][x];
      var c = palette[ch];
      if(c) rects += '<rect x="'+x+'" y="'+y+'" width="1" height="1" fill="'+c+'"/>';
    }
  }
  return '<svg viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges" preserveAspectRatio="xMidYMax meet">'+rects+'</svg>';
}

function swapPalette(overrides){
  var p = {};
  for(var k in PALETTE) p[k] = PALETTE[k];
  for(var k in overrides) p[k] = overrides[k];
  return p;
}

function ensureAudio(){

  try {

  return audioCtx;
}

function blip(freq, dur, type, vol){
  var ctx = ensureAudio(); if(!ctx) return;
  type = type || 'square'; vol = vol || 0.15;
  var osc = ctx.createOscillator();
  var gain = ctx.createGain();
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + dur);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + dur);
}

    var w = WORDS[i];
    var weight = state.weights[w] || 1;
    for(var j=0;j<weight;j++) pool.push(w);
  }
  return pool[Math.floor(Math.random()*pool.length)];
}

function setupRecognition(){
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return null;
  var r = new SR();
  r.lang = 'en-US';
  r.continuous = false;
  r.interimResults = false;
  r.maxAlternatives = 10;
  return r;
}

function startMic(){
  if(state.phase !== 'listening') return;
  
  var btn = document.getElementById('mic-btn');
  var label = document.getElementById('mic-label');
  var countdown = document.getElementById('mic-countdown');
  
  btn.classList.add('listening');
  btn.textContent = '🔴';
  label.textContent = 'LISTENING...';
  
  countdown.classList.add('show');
  var remaining = 2.0;
  countdown.textContent = remaining.toFixed(1) + 's';
  listenInterval = setInterval(function(){
    remaining = Math.max(0, remaining - 0.1);
    countdown.textContent = remaining.toFixed(1) + 's';
  }, 100);
  
  recognition = setupRecognition();
  if(!recognition){
    showDialog("This iPhone doesn't support speech recognition. Make sure you're using Safari!", 4000);
    stopMic();
    return;
  }
  
  var heardSomething = false;
  
  recognition.onresult = function(ev){
    heardSomething = true;
    var alts = [];
    if(ev.results && ev.results[0]){
      for(var i=0;i<ev.results[0].length;i++){
        alts.push(ev.results[0][i].transcript.trim().toLowerCase());
      }
    }
    stopMic();
    doCheck(alts);
  };
  recognition.onerror = function(ev){
    if(ev.error === 'no-speech'){
      stopMic();
      showDialog('I didn\'t hear you. Try again! 🎤', 1600);
    } else if(ev.error === 'aborted'){
      stopMic();
    } else {
      stopMic();
      showDialog('Try again! 🎤', 1500);
    }
  };
  recognition.onend = function(){
    if(!heardSomething){ stopMic(); }
  };
  
  try { recognition.start(); } catch(e){ stopMic(); }
  
  listenTimer = setTimeout(function(){
    if(recognition){
      try { recognition.stop(); } catch(e){}
    }
  }, 2000);
}

function stopMic(){
  var btn = document.getElementById('mic-btn');
  var label = document.getElementById('mic-label');
  var countdown = document.getElementById('mic-countdown');
  btn.classList.remove('listening');
  btn.textContent = '🎤';
  label.textContent = 'TAP TO SPEAK';
  countdown.classList.remove('show');
  if(listenTimer) { clearTimeout(listenTimer); listenTimer = null; }
  if(listenInterval) { clearInterval(listenInterval); listenInterval = null; }
  if(recognition){
    try { recognition.abort(); } catch(e){}
    recognition = null;
  }
}

function lenientMatch(target, heard){
  target = (target||'').toLowerCase().trim();
  heard = (heard||'').toLowerCase().trim();
  if(!heard) return false;
  if(heard === target) return true;
  var subs = HOMOPHONES[target] || [];
  for(var i=0;i<subs.length;i++) if(heard === subs[i]) return true;
  if(target.length<=4 && levenshtein(target, heard) <= 1) return true;
  if(target.length<=6 && levenshtein(target, heard) <= 2) return true;
  var heardWords = heard.split(/\s+/);
  for(var i=0;i<heardWords.length;i++){
    if(heardWords[i] === target) return true;
    for(var j=0;j<subs.length;j++) if(heardWords[i]===subs[j]) return true;
  }
  return false;
}

function levenshtein(a,b){
  if(a===b) return 0;
  if(!a) return b.length;
  if(!b) return a.length;
  var m = []; for(var i=0;i<=b.length;i++) m[i]=[i];
  for(var j=0;j<=a.length;j++) m[0][j]=j;
  for(var i=1;i<=b.length;i++){
    for(var j=1;j<=a.length;j++){
      m[i][j] = b[i-1]===a[j-1] ? m[i-1][j-1] : Math.min(m[i-1][j-1]+1, m[i][j-1]+1, m[i-1][j]+1);
    }
  }
  return m[b.length][a.length];
}

function doCheck(alts){
  for(var i=0;i<alts.length;i++){
    if(lenientMatch(word, alts[i])) {
      correct();
      return;
    }
  }
  miss();
}

function correct(){
  state.phase = 'celebrating';
  state.combo++;
  state.totalCorrect++;
  state.bestStreak = Math.max(state.bestStreak, state.combo);
  state.sessionWords.push({word:word, correct:true});
  state.weights[word] = 1;
  playCorrectSound();
  
  document.getElementById('qblock').classList.add('bumped');
  setTimeout(function(){
    document.getElementById('qblock').classList.remove('bumped');
    drawQBlock(true);
  }, 400);
  
  setTimeout(spawnGoomba, 600);
}

function miss(){
  state.combo = 0;
  state.weights[word] = (state.weights[word] || 1) + 1;
  state.sessionWords.push({word:word, correct:false});
  playWrongSound();
  showDialog('Try again! The word is "'+word+'" 🎤', 1800);
  setTimeout(function(){
    document.getElementById('mic-label').textContent = 'TAP TO SPEAK';
  }, 100);

      playStompSound();
      g.classList.remove('walking');
      g.innerHTML = renderSprite(SPR_GOOMBA_SQUISHED);

      coinPop();
      
      setTimeout(function(){
        if(g && g.parentNode) g.parentNode.removeChild(g);
        goombaActive = null;
        state.score++;
        updateScoreDisplay();
        checkPowerUps();
        if(state.score % 10 === 0){
          applyWorld((state.score/10) % WORLDS.length);
          playFanfare();
          setTimeout(function(){
            if(state.totalCorrect % 5 === 0){
              showSummary();
            } else {
              setTimeout(spawn, 800);
            }
          }, 3000);
        } else {
          if(state.totalCorrect % 5 === 0){
            setTimeout(showSummary, 1000);
          } else {
            setTimeout(spawn, 1200);
          }
        }
        save();
      }, 600);
    }, 250);
  }, 250);
}

    html += '<div class="word-grid">';
    state.sessionWords.slice(-15).forEach(function(sw){
      html += '<span class="word-pill '+(sw.correct?'correct':'missed')+'">'+sw.word+'</span>';
    });
    html += '</div>';
  }
  
  html += '<button class="menu-back" id="continue-btn">▶ CONTINUE</button>';
  document.getElementById('menu-content').innerHTML = html;
  document.getElementById('menu-overlay').classList.add('show');
  document.getElementById('continue-btn').onclick = function(){
    document.getElementById('menu-overlay').classList.remove('show');
    state.phase = 'idle';
    setTimeout(spawn, 400);
  };
}

function showMenu(){
  var html = '<h2>★ MENU ★</h2>';
  html += '<div class="menu-row" style="flex-direction:column;align-items:stretch;gap:8px">';
  html += '<button class="btn-secondary" id="menu-resume">▶ RESUME</button>';
  html += '<button class="btn-secondary" id="menu-costumes">👕 COSTUMES</button>';
  html += '<button class="btn-secondary" id="menu-music">'+(state.musicOn?'🔊 MUSIC: ON':'🔇 MUSIC: OFF')+'</button>';
  html += '<button class="btn-secondary" id="menu-reset">🗑 RESET PROGRESS</button>';
  html += '</div>';
  document.getElementById('menu-content').innerHTML = html;
  document.getElementById('menu-overlay').classList.add('show');
  
  document.getElementById('menu-resume').onclick = closeMenu;
  document.getElementById('menu-costumes').onclick = showCostumes;
  document.getElementById('menu-music').onclick = function(){
    state.musicOn = !state.musicOn;
    if(state.musicOn) startBgMusic(); else stopBgMusic();
    document.getElementById('music-toggle').textContent = state.musicOn ? '♫ ON' : '♫ OFF';
    save();
    showMenu();
  };
  document.getElementById('menu-reset').onclick = function(){
    if(confirm('Reset all progress?')){
      localStorage.removeItem(SAVE_KEY);
      location.reload();
    }
  };
}
function closeMenu(){
  document.getElementById('menu-overlay').classList.remove('show');
}
function showCostumes(){
  var html = '<h2>👕 PICK A COSTUME ★</h2><div class="menu-row">';
  COSTUMES.forEach(function(c){
    html += '<div class="costume-card '+(c.id===state.costumeId?'selected':'')+'" data-id="'+c.id+'">';
    html += renderSprite(SPR_MARIO_IDLE, c.palette);
    html += '<div class="name">'+c.name+'</div>';
    html += '</div>';
  });
  html += '</div>';
  html += '<button class="menu-back" id="back-btn">← BACK</button>';
  document.getElementById('menu-content').innerHTML = html;
  document.querySelectorAll('.costume-card').forEach(function(card){
    card.onclick = function(){
      state.costumeId = card.getAttribute('data-id');
      save();
      drawTitleMario();
      setMarioFrame(0);
      showCostumes();
    };
  });
  document.getElementById('back-btn').onclick = showMenu;
}

function init(){
  load();
  drawTitleMario();
  drawCoinsIcon();
  drawQBlock(false);
  setMarioFrame(0);
  renderScenery();
  updateScoreDisplay();
  document.getElementById('music-toggle').textContent = state.musicOn ? '♫ ON' : '♫ OFF';
  applyWorld(state.worldIdx);
}

document.addEventListener('DOMContentLoaded', init);

document.getElementById('start-listen-tap').addEventListener('click', function(){
  ensureAudio();
  state.audioReady = true;
  document.getElementById('start-listen-tap').classList.add('hide');
  if(state.musicOn) startBgMusic();
});

document.getElementById('btn-start').addEventListener('click', function(){
  document.getElementById('title').classList.add('hide');
  startMarioWalkAnimation();
  setTimeout(function(){
    stopMarioWalkAnimation();
    spawn();
  }, 1400);
});

document.getElementById('btn-settings').addEventListener('click', showCostumes);

document.getElementById('mic-btn').addEventListener('click', function(){
  ensureAudio();
  if(state.phase !== 'listening') return;
  startMic();
});

document.getElementById('menu-btn').addEventListener('click', showMenu);

document.getElementById('music-toggle').addEventListener('click', function(){
  state.musicOn = !state.musicOn;
  if(state.musicOn) startBgMusic(); else stopBgMusic();
  document.getElementById('music-toggle').textContent = state.musicOn ? '♫ ON' : '♫ OFF';
  save();
});

</script>

</body>
</html>
