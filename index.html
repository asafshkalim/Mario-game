<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mario Sight Words</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Andika:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*,*:before,*:after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Andika',system-ui,sans-serif;color:#fff;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;touch-action:manipulation}
body{height:100dvh}
img,svg{image-rendering:pixelated;image-rendering:-moz-crisp-edges;image-rendering:crisp-edges;display:block}
img.sprite-img{width:100%;height:100%;-webkit-user-drag:none;user-select:none;pointer-events:none}
button{font-family:inherit}

#rotate-prompt{position:fixed;inset:0;background:#000;display:none;align-items:center;justify-content:center;z-index:9999;color:#fff;text-align:center;padding:20px;font-family:‘Press Start 2P’,monospace;font-size:13px;line-height:1.6}
@media (orientation:portrait){
#rotate-prompt{display:flex}
#app{display:none !important}
#start-listen-tap{display:none !important}
}
#rotate-icon{font-size:64px;margin-bottom:18px;animation:rotateBounce 1s ease-in-out infinite alternate}
@keyframes rotateBounce{from{transform:rotate(0deg)}to{transform:rotate(90deg)}}

#app{position:fixed;inset:0;display:flex;flex-direction:column;background:#5c94fc}

/* –– TITLE SCREEN –– */
#title{position:absolute;inset:0;display:flex;flex-direction:row;align-items:center;justify-content:center;gap:20px;background:linear-gradient(180deg,#5c94fc 0%,#5c94fc 78%,#00a800 78%,#00a800 100%);z-index:30;padding:0 6vw}
#title.hide{display:none}
.title-mario{width:80px;height:80px;animation:bounce .55s ease-in-out infinite alternate;filter:drop-shadow(3px 3px 0 #000);flex:0 0 auto}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.title-card-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;flex:0 1 auto}
.title-card{background:#000;border:3px solid #fbd000;border-radius:6px;padding:10px 22px;text-align:center;box-shadow:4px 4px 0 #d82800,8px 8px 0 #fbd000}
.title-card h1{font-family:‘Press Start 2P’,monospace;font-size:18px;color:#fbd000;text-shadow:2px 2px 0 #d82800;letter-spacing:2px;line-height:1.3}
.title-card p{font-family:‘Andika’,sans-serif;font-weight:700;font-size:14px;color:#fff;margin-top:6px}
.title-buttons{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap}
.btn-primary{background:#fbd000;color:#000;border:2px solid #000;border-radius:5px;padding:8px 16px;font-family:‘Press Start 2P’,monospace;font-size:11px;cursor:pointer;box-shadow:3px 3px 0 #000;font-weight:bold}
.btn-primary:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #000}
.btn-secondary{background:#aaa;color:#000;border:2px solid #000;border-radius:5px;padding:7px 12px;font-family:‘Press Start 2P’,monospace;font-size:9px;cursor:pointer;box-shadow:2px 2px 0 #000}
.btn-secondary:active{transform:translate(2px,2px);box-shadow:0 0 0 #000}

/* –– HUD –– */
#hud{position:absolute;top:0;left:0;right:0;height:32px;background:rgba(0,0,0,.72);color:#fff;font-family:‘Press Start 2P’,monospace;font-size:9px;display:flex;align-items:center;justify-content:space-between;padding:0 8px;z-index:5;border-bottom:2px solid #fbd000;gap:8px}
#coins-hud{display:flex;align-items:center;gap:5px;flex:0 0 auto}
#coins-icon{width:14px;height:14px}
#world-label{color:#fbd000;flex:1 1 auto;text-align:center;font-size:9px;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#progress-bar{display:flex;align-items:center;gap:3px;flex:0 0 auto;font-size:8px;color:#fff}
#progress-bar .pip{width:8px;height:8px;background:#444;border:1px solid #000;border-radius:1px}
#progress-bar .pip.fill{background:#fbd000;box-shadow:0 0 4px #fbd000}
#menu-btn{background:#fbd000;color:#000;border:2px solid #000;padding:3px 7px;font-family:‘Press Start 2P’,monospace;font-size:9px;border-radius:3px;cursor:pointer;flex:0 0 auto}
#music-toggle{background:rgba(0,0,0,.7);color:#fff;border:2px solid #fbd000;padding:3px 6px;font-family:‘Press Start 2P’,monospace;font-size:8px;border-radius:3px;cursor:pointer;flex:0 0 auto}

/* –– STAGE –– */
#stage{position:absolute;top:32px;left:0;right:0;bottom:0;overflow:hidden;background:#5c94fc}
#stage.world-w0{background:linear-gradient(180deg,#5c94fc 0%,#5c94fc 100%)}
#stage.world-w1{background:linear-gradient(180deg,#fcae66 0%,#fbd000 100%)}
#stage.world-w2{background:linear-gradient(180deg,#0078a8 0%,#003478 100%)}
#stage.world-w3{background:linear-gradient(180deg,#202020 0%,#480000 100%)}

#shake{position:absolute;inset:0}
#shake.shake{animation:shake .35s}
@keyframes shake{0%,100%{transform:translate(0,0)}25%{transform:translate(-3px,2px)}50%{transform:translate(3px,-2px)}75%{transform:translate(-2px,2px)}}

#clouds-layer,#hills-layer,#bushes-layer,#ground-layer,#entities-layer,#fx-layer{position:absolute;left:0;right:0}
#clouds-layer{top:6px;height:48px;pointer-events:none}
#hills-layer{bottom:40px;height:54px;pointer-events:none}
#bushes-layer{bottom:40px;height:24px;pointer-events:none}
#ground-layer{bottom:0;height:40px;background-repeat:repeat-x;background-size:40px 40px;z-index:4}
#entities-layer{top:0;bottom:40px;pointer-events:none}
#fx-layer{top:0;bottom:0;pointer-events:none;z-index:8}

.cloud-sprite{position:absolute;width:64px;height:auto;opacity:.95}
.hill-sprite{position:absolute;width:96px;height:auto}
.bush-sprite{position:absolute;width:64px;height:auto}

/* Mario sized to fit small landscape — 56px tall sprite. Feet sit on top of ground (entities-layer bottom is at ground top). */
#mario{position:absolute;left:14%;bottom:0;width:56px;height:56px;z-index:6;transition:transform .15s,height .25s,width .25s}
#mario.big{transform:scale(1.45);transform-origin:bottom center}
#mario.big-power{height:96px;width:55px}
#mario.invinc{filter:drop-shadow(0 0 6px #fbd000)}
#mario.fire-power{filter:drop-shadow(0 0 5px rgba(255,255,255,.9))}
#mario.star-power{animation:starFlash .12s steps(1) infinite}
@keyframes starFlash{
0%{filter:hue-rotate(0deg) saturate(1.5) drop-shadow(0 0 8px #fbd000)}
20%{filter:hue-rotate(72deg) saturate(1.5) drop-shadow(0 0 8px #ff5fbf)}
40%{filter:hue-rotate(144deg) saturate(1.5) drop-shadow(0 0 8px #5fffd0)}
60%{filter:hue-rotate(216deg) saturate(1.5) drop-shadow(0 0 8px #5f8fff)}
80%{filter:hue-rotate(288deg) saturate(1.5) drop-shadow(0 0 8px #ff8f5f)}
100%{filter:hue-rotate(360deg) saturate(1.5) drop-shadow(0 0 8px #fbd000)}
}

#qblock{position:absolute;left:24%;top:18%;width:42px;height:42px;z-index:5;animation:qbounce 1.4s ease-in-out infinite}
@keyframes qbounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
#qblock.bumped{animation:qbump .4s ease-out}
@keyframes qbump{0%{transform:translateY(0)}40%{transform:translateY(-22px)}100%{transform:translateY(0)}}

/* Poster — centered horizontally over scene; sized to fit */
#poster{position:absolute;left:50%;top:14%;transform:translateX(-50%);background:#fff;border:3px solid #000;border-radius:6px;padding:8px 18px;box-shadow:4px 4px 0 #000;z-index:5;display:flex;align-items:center;justify-content:center;min-width:110px;min-height:48px;max-width:55%}
#poster.flash-context{background:#fffbe0}
#poster .word{font-family:‘Andika’,sans-serif;font-weight:700;color:#000;font-size:34px;line-height:1;letter-spacing:1px}
#poster .sentence{font-family:‘Andika’,sans-serif;font-weight:700;color:#000;font-size:16px;line-height:1.2;text-align:center}

.goomba,.enemy{position:absolute;width:42px;height:42px;z-index:6}
.enemy-piranha{width:48px;height:80px;bottom:0}
/* Only goomba uses the bounce animation; koopa & piranha animate via sprite frame swaps */
.enemy-goomba.walking{animation:goombaBounce .35s ease-in-out infinite alternate}
@keyframes goombaBounce{from{transform:translateY(0) scaleY(1)}to{transform:translateY(-2px) scaleY(.94)}}

.fireball{position:absolute;font-size:24px;z-index:7;text-shadow:0 0 8px #ff5f00,0 0 14px #ff8f00;animation:fireballSpin .15s linear infinite}
@keyframes fireballSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* Item picker */
#dialog.picker-mode{padding:10px 14px;background:rgba(0,0,0,.95);max-width:90%;width:auto}
.picker-title{font-family:‘Press Start 2P’,monospace;font-size:11px;color:#fbd000;text-shadow:2px 2px 0 #000;margin-bottom:8px}
.picker-row{display:flex;gap:8px;justify-content:center;align-items:stretch}
.picker-card{background:#1a1a1a;border:3px solid #fbd000;border-radius:6px;padding:6px 4px;cursor:pointer;width:74px;display:flex;flex-direction:column;align-items:center;gap:4px;box-shadow:3px 3px 0 #000;transition:transform .15s, box-shadow .15s}
.picker-card:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #000}
.picker-card.chosen{transform:scale(1.15);border-color:#fff;box-shadow:0 0 16px #fbd000,0 0 28px rgba(251,208,0,.6)}
.picker-icon{width:38px;height:38px;display:flex;align-items:center;justify-content:center}
.picker-icon img.sprite-img{width:100%;height:100%;image-rendering:pixelated}
.picker-emoji{font-size:30px;line-height:1}
.picker-name{font-family:‘Press Start 2P’,monospace;font-size:7px;color:#fff;text-align:center;line-height:1.2}
#dialog.shake-attn{animation:dialogShake .35s ease-in-out}
@keyframes dialogShake{0%,100%{transform:translate(-50%,-50%)}25%{transform:translate(calc(-50% - 6px),-50%)}50%{transform:translate(calc(-50% + 6px),-50%)}75%{transform:translate(calc(-50% - 4px),-50%)}}

.pickup{position:absolute;width:34px;height:34px;z-index:7;filter:drop-shadow(0 0 6px #fff) drop-shadow(2px 2px 0 #000);transition:transform .1s;will-change:transform}
.pickup-mushroom{filter:drop-shadow(0 0 8px #ff8f00) drop-shadow(2px 2px 0 #000)}
.pickup-fire{filter:drop-shadow(0 0 8px #ff5f00) drop-shadow(2px 2px 0 #000)}
.pickup-star{animation:starWobble .35s steps(2) infinite alternate;filter:drop-shadow(0 0 10px #fbd000) drop-shadow(0 0 16px #ffd000)}
@keyframes starWobble{from{filter:drop-shadow(0 0 10px #fbd000) drop-shadow(0 0 16px #ffd000) hue-rotate(0deg)}to{filter:drop-shadow(0 0 10px #fbd000) drop-shadow(0 0 16px #ffd000) hue-rotate(60deg)}}
.pickup:active{transform:scale(.85)}

.sparkle{position:absolute;font-size:18px;pointer-events:none;animation:sparkleFly .65s ease-out forwards;will-change:transform,opacity}
@keyframes sparkleFly{
0%{opacity:1;transform:translate(-50%,-50%) scale(.5)}
60%{opacity:1}
100%{opacity:0;transform:translate(calc(-50% + var(–dx, 0)),calc(-50% + var(–dy, 0))) scale(1.4)}
}

#mic-wrap{position:absolute;right:3%;bottom:50px;z-index:7;display:flex;flex-direction:column;align-items:center;gap:4px}
#mic-btn{width:64px;height:64px;border-radius:50%;border:3px solid #000;background:radial-gradient(circle,#fbd000 0%,#f8b800 70%,#d09000 100%);color:#000;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(251,208,0,.7),3px 3px 0 #000;animation:micPulse 1.5s ease-in-out infinite;font-family:‘Press Start 2P’,monospace}
#mic-btn:active{transform:translate(2px,2px);box-shadow:0 0 20px rgba(251,208,0,.7),1px 1px 0 #000}
#mic-btn.listening{background:radial-gradient(circle,#ff4040 0%,#c00000 70%,#700000 100%);animation:micListen .55s ease-in-out infinite}
@keyframes micPulse{0%,100%{box-shadow:0 0 20px rgba(251,208,0,.7),3px 3px 0 #000}50%{box-shadow:0 0 36px rgba(251,208,0,1),3px 3px 0 #000}}
@keyframes micListen{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
#mic-label{font-family:‘Press Start 2P’,monospace;font-size:8px;background:rgba(0,0,0,.7);padding:3px 6px;border-radius:3px;border:1px solid #fbd000;color:#fff;white-space:nowrap}
#mic-countdown{font-family:‘Press Start 2P’,monospace;font-size:18px;color:#fbd000;text-shadow:2px 2px 0 #000,0 0 8px rgba(251,208,0,.8);display:none;font-weight:bold}
#mic-countdown.show{display:block}
#mic-countdown.urgent{color:#ff4040;text-shadow:2px 2px 0 #000,0 0 10px rgba(255,64,64,.9);animation:urgentPulse .25s ease-in-out infinite alternate}
@keyframes urgentPulse{from{transform:scale(1)}to{transform:scale(1.15)}}

#flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:9}
#flash.flash{animation:flashOnce .3s}
@keyframes flashOnce{0%{opacity:0}50%{opacity:.8}100%{opacity:0}}

.coin-particle{position:absolute;width:18px;height:18px;z-index:9;animation:coinFly 1.2s ease-out forwards}
@keyframes coinFly{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-140px) translateX(var(–dx,0)) scale(.5) rotate(720deg)}}
.score-pop{position:absolute;font-family:‘Press Start 2P’,monospace;font-size:16px;color:#fbd000;text-shadow:2px 2px 0 #000;z-index:9;pointer-events:none;animation:scorePop 1.2s ease-out forwards}
@keyframes scorePop{0%{opacity:0;transform:translateY(0) scale(.5)}30%{opacity:1;transform:translateY(-22px) scale(1.2)}100%{opacity:0;transform:translateY(-80px) scale(1)}}

#dialog{position:absolute;left:50%;top:38%;transform:translate(-50%,-50%);background:rgba(0,0,0,.92);border:3px solid #fbd000;border-radius:8px;padding:12px 22px;font-family:‘Andika’,sans-serif;font-weight:700;font-size:16px;text-align:center;color:#fff;z-index:10;display:none;max-width:80%}
#dialog.show{display:block;animation:dialogPop .3s}
@keyframes dialogPop{from{transform:translate(-50%,-50%) scale(.7);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}

/* –– MENU OVERLAY –– */
#menu-overlay{position:absolute;inset:0;background:rgba(0,0,0,.88);z-index:50;display:none;align-items:center;justify-content:center;padding:14px}
#menu-overlay.show{display:flex}
.menu-panel{background:#000;border:3px solid #fbd000;border-radius:8px;padding:14px;max-width:96%;max-height:96%;overflow-y:auto;width:560px}
.menu-panel h2{font-family:‘Press Start 2P’,monospace;font-size:13px;color:#fbd000;text-align:center;margin-bottom:10px;letter-spacing:1px}
.menu-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:8px 0}
.menu-back{background:#aaa;color:#000;border:2px solid #000;padding:6px 12px;font-family:‘Press Start 2P’,monospace;font-size:10px;cursor:pointer;border-radius:3px;display:block;margin:10px auto 0;box-shadow:2px 2px 0 #000}
.menu-row.column{flex-direction:column;align-items:stretch;gap:6px;max-width:300px;margin-left:auto;margin-right:auto}
.menu-row.column .btn-secondary{font-size:10px;padding:8px 10px}

.costume-card{background:#222;border:2px solid #444;border-radius:5px;padding:6px;cursor:pointer;text-align:center;width:88px}
.costume-card.selected{border-color:#fbd000;background:#3a2c00;box-shadow:0 0 8px rgba(251,208,0,.6)}
.costume-card svg{width:54px;height:auto;margin:0 auto}
.costume-thumb{width:54px;height:54px;margin:0 auto}
.costume-card .name{font-family:‘Andika’,sans-serif;font-weight:700;font-size:11px;color:#fff;margin-top:3px}

/* Stickers */
.sticker-progress{font-family:‘Press Start 2P’,monospace;font-size:10px;color:#fbd000;text-align:center;margin:4px 0 8px}
.sticker-empty{font-family:‘Andika’,sans-serif;font-size:14px;color:#fff;text-align:center;padding:20px 10px;font-weight:700}
.sticker-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-height:200px;overflow-y:auto;padding:4px}
.sticker{width:62px;height:62px;border:3px solid #000;border-radius:50%;box-shadow:2px 2px 0 #000,inset 0 -4px 0 rgba(0,0,0,.25);display:flex;flex-direction:column;align-items:center;justify-content:center;flex:0 0 auto}
.sticker-emoji{font-size:18px;line-height:1}
.sticker-word{font-family:‘Andika’,sans-serif;font-weight:700;font-size:10px;color:#000;text-shadow:1px 1px 0 rgba(255,255,255,.4);margin-top:2px;text-align:center;line-height:1;word-break:break-all;padding:0 2px}
.sticker-stats{font-family:‘Press Start 2P’,monospace;font-size:10px;color:#fff;text-align:center;margin-top:10px;padding:6px;background:rgba(0,0,0,.4);border-radius:4px;border:1px solid #fbd000}

.sticker-earned{position:absolute;top:18%;left:50%;transform:translateX(-50%);background:#fbd000;border:3px solid #000;border-radius:8px;padding:8px 18px;box-shadow:4px 4px 0 #000;text-align:center;z-index:9;animation:stickerPop 1.7s ease-out forwards;pointer-events:none}
.sticker-earned .se-line1{font-family:‘Press Start 2P’,monospace;font-size:10px;color:#000}
.sticker-earned .se-line2{font-family:‘Andika’,sans-serif;font-weight:700;font-size:18px;color:#000;margin-top:4px;text-transform:uppercase}
@keyframes stickerPop{0%{opacity:0;transform:translateX(-50%) scale(.5) translateY(20px)}20%{opacity:1;transform:translateX(-50%) scale(1.1) translateY(0)}30%{transform:translateX(-50%) scale(1) translateY(0)}80%{opacity:1;transform:translateX(-50%) scale(1) translateY(0)}100%{opacity:0;transform:translateX(-50%) scale(1) translateY(-20px)}}

.summary-stats{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin:8px 0;font-family:‘Andika’,sans-serif;font-weight:700;font-size:11px;color:#fff}
.summary-stats div{background:#1a1a1a;padding:6px;border-radius:4px;text-align:center;border:2px solid #444}
.summary-stats .num{display:block;font-size:18px;color:#fbd000;font-family:‘Press Start 2P’,monospace;margin-bottom:2px}
.word-grid{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin:8px 0;max-height:80px;overflow-y:auto;padding:3px}
.word-pill{padding:3px 8px;border-radius:11px;font-family:‘Andika’,sans-serif;font-weight:700;font-size:12px;border:2px solid #000}
.word-pill.correct{background:#00a800;color:#fff}
.word-pill.missed{background:#d82800;color:#fff}

/* Dictionary editor */
.dict-list{max-height:160px;overflow-y:auto;background:#111;border:2px solid #333;border-radius:5px;padding:6px;margin:6px 0;display:flex;flex-wrap:wrap;gap:5px}
.dict-pill{background:#222;color:#fff;font-family:‘Andika’,sans-serif;font-weight:700;font-size:12px;padding:3px 8px;border-radius:11px;border:2px solid #555;display:flex;align-items:center;gap:4px}
.dict-pill button{background:#d82800;color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:11px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0;line-height:1}
.dict-add{display:flex;gap:6px;margin:6px 0;justify-content:center;flex-wrap:wrap}
.dict-add input{font-family:‘Andika’,sans-serif;font-weight:700;font-size:14px;padding:6px 8px;border:2px solid #fbd000;border-radius:4px;background:#fff;color:#000;width:180px}
.dict-add button{background:#00a800;color:#fff;border:2px solid #000;border-radius:4px;padding:6px 12px;font-family:‘Press Start 2P’,monospace;font-size:9px;cursor:pointer;box-shadow:2px 2px 0 #000}
.dict-add button:active{transform:translate(2px,2px);box-shadow:0 0 0 #000}
.dict-info{font-family:‘Andika’,sans-serif;font-size:11px;color:#aaa;text-align:center;margin:4px 0}

/* Level complete */
#levelup-overlay{position:absolute;inset:0;background:rgba(0,0,0,.88);z-index:60;display:none;align-items:center;justify-content:center;padding:14px;flex-direction:column;color:#fff;text-align:center}
#levelup-overlay.show{display:flex;animation:fadeIn .4s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.lu-flag{font-size:54px;animation:flagWave 1s ease-in-out infinite}
@keyframes flagWave{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-8px) rotate(3deg)}}
.lu-title{font-family:‘Press Start 2P’,monospace;font-size:18px;color:#fbd000;text-shadow:3px 3px 0 #d82800;margin:10px 0 6px;letter-spacing:1px}
.lu-sub{font-family:‘Andika’,sans-serif;font-weight:700;font-size:16px;color:#fff;margin-bottom:14px}
.lu-next{font-family:‘Press Start 2P’,monospace;font-size:11px;color:#fbd000;margin-bottom:12px}

#start-listen-tap{position:absolute;inset:0;background:rgba(0,0,0,.92);z-index:100;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff;font-family:‘Press Start 2P’,monospace;font-size:12px;text-align:center;padding:20px}
#start-listen-tap.hide{display:none}
#start-listen-tap p{margin:6px 0;line-height:1.5}
#start-listen-tap .pulse{font-size:24px;animation:bounce .55s ease-in-out infinite alternate;color:#fbd000;text-shadow:2px 2px 0 #d82800;margin-bottom:10px}

@media (max-height:380px){
#title{padding:0 4vw;gap:14px}
.title-mario{width:64px;height:64px}
.title-card h1{font-size:15px}
.title-card p{font-size:12px}

// ---- PERSISTENCE ----
function save(){
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      score:state.score, totalCorrect:state.totalCorrect, totalSeen:state.totalSeen,
      bestStreak:state.bestStreak, worldIdx:state.worldIdx, worldProgress:state.worldProgress,
      costumeId:state.costumeId, musicOn:state.musicOn,
      weights:state.weights, customWords:state.customWords,
      powerLevel:state.powerLevel, stickers:state.stickers, enemyKills:state.enemyKills
    }));
  } catch(e){}
}
function load(){
  try {
    var raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return;
    var s = JSON.parse(raw);
    if(s){
      for(var k in s) if(s.hasOwnProperty(k)) state[k] = s[k];
    }
  } catch(e){}
}

function getWordList(){
  if(state.customWords && state.customWords.length>0) return state.customWords;
  return DEFAULT_WORDS;

function renderSprite(grid, palette){
  palette = palette || PALETTE;
  var rows = grid.length;
  var cols = grid[0].length;
  var svg = '<svg viewBox="0 0 '+cols+' '+rows+'" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet" style="width:100%;height:100%">';
  for(var y=0;y<rows;y++){
    var row = grid[y];
    for(var x=0;x<cols;x++){
      var c = row.charAt(x);
      var col = palette[c];
      if(col){
        svg += '<rect x="'+x+'" y="'+y+'" width="1" height="1" fill="'+col+'"/>';
      }
    }
  }
  svg += '</svg>';
  return svg;
}

// ---- AUDIO ----
function ensureAudio(){
  if(audioCtx) return audioCtx;
  try {
    var Ctx = window.AudioContext || window.webkitAudioContext;
    audioCtx = new Ctx();
  } catch(e){ audioCtx = null; }
  return audioCtx;
}

function blip(freq, dur, type, vol){
  var ctx = ensureAudio(); if(!ctx) return;
  type = type || 'square';
  vol = (vol == null) ? 0.15 : vol;
  if(!freq || freq<=0) return;
  var osc = ctx.createOscillator();
  var gain = ctx.createGain();
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + dur);
}

// ---- HTML5 AUDIO (real SMB3 sounds, embedded as base64) ----
var audioPool = {}; // key -> Audio element kept warm after gesture unlock
var bgMusicEl = null;
var audioUnlocked = false;

function unlockAudio(){
  // Must be called inside a user-gesture handler. Pre-creates and primes
  // each Audio element so subsequent .play() calls work on iOS Safari.
  if(audioUnlocked || typeof AUDIO === 'undefined') return;
  try {
    Object.keys(AUDIO).forEach(function(key){
      try {
        var a = new Audio(AUDIO[key]);
        a.volume = 0.0001; // silent prime
        var p = a.play();
        if(p && typeof p.then === 'function'){
          p.then(function(){ a.pause(); a.currentTime = 0; a.volume = 1; }).catch(function(){});
        } else {
          // Synchronous (older API) — pause immediately
          a.pause(); a.currentTime = 0; a.volume = 1;
        }
        audioPool[key] = a;
      } catch(e){}
    });
    audioUnlocked = true;
  } catch(e){}
}

function makeAudio(key, vol){
  if(typeof AUDIO === 'undefined' || !AUDIO[key]) return null;
  // Prefer pooled element (already unlocked); reset playback head and reuse.
  var pooled = audioPool[key];
  if(pooled && audioUnlocked){
    try {
      pooled.pause();
      pooled.currentTime = 0;
      pooled.volume = vol == null ? 0.6 : vol;
      return pooled;
    } catch(e){}
  }
  // Fallback: fresh element (may fail on iOS without prior gesture)
  var a = new Audio(AUDIO[key]);
  a.volume = vol == null ? 0.6 : vol;
  return a;
}

function playSfx(key, vol){
  try {
    var a = makeAudio(key, vol);
    if(!a) return;
    var p = a.play();
    if(p && typeof p.catch === 'function') p.catch(function(){});
  } catch(e){ /* JSDOM/older browsers may throw */ }
}

function startBgMusic(){
  if(!state.musicOn) return;
  if(musicTimer){ clearTimeout(musicTimer); musicTimer = null; }
  if(bassTimer){ clearTimeout(bassTimer); bassTimer = null; }
  if(bgMusicEl){
    try {
      var p = bgMusicEl.play();
      if(p && typeof p.catch === 'function') p.catch(function(){});
    } catch(e){}
    return;
  }
  if(typeof AUDIO === 'undefined' || !AUDIO.music_loop) return;
  try {
    bgMusicEl = new Audio(AUDIO.music_loop);
    bgMusicEl.loop = true;
    bgMusicEl.volume = 0.35;
    var p = bgMusicEl.play();
    if(p && typeof p.catch === 'function') p.catch(function(){});
  } catch(e){
    bgMusicEl = null;
  }
}

function stopBgMusic(){
  if(musicTimer){ clearTimeout(musicTimer); musicTimer = null; }
  if(bassTimer){ clearTimeout(bassTimer); bassTimer = null; }
  if(bgMusicEl){
    try { bgMusicEl.pause(); bgMusicEl.currentTime = 0; } catch(e){}
    bgMusicEl = null;
  }
}

// ---- SPEECH RECOGNITION ----
function setupRecognition(){
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return null;
  var r = new SR();
  r.lang = 'en-US';
  // iOS Safari has historically poor support for continuous=true and interimResults=true.
  // We use single-shot mode (best iOS reliability) and rely on multiple alternatives + lenient match.
  r.continuous = false;
  r.interimResults = false;
  r.maxAlternatives = 10;
  return r;
}

function startMic(){
  if(state.phase !== 'listening') return;

  // If a previous recognition is still running, clean it up first
  if(recognition){
    try { recognition.abort(); } catch(e){}
    recognition = null;
  }
  if(listenTimer){ clearTimeout(listenTimer); listenTimer = null; }
  if(listenInterval){ clearInterval(listenInterval); listenInterval = null; }

  var btn = document.getElementById('mic-btn');
  var label = document.getElementById('mic-label');
  var countdown = document.getElementById('mic-countdown');

  btn.classList.add('listening');
  btn.textContent = '🔴';
  label.textContent = 'LISTENING...';

  var LISTEN_SECONDS = 5.0; // generous window for kids
  countdown.classList.add('show');
  var remaining = LISTEN_SECONDS;
  countdown.textContent = Math.ceil(remaining) + 's';
  listenInterval = setInterval(function(){
    remaining = Math.max(0, remaining - 0.1);
    countdown.textContent = Math.ceil(remaining) + 's';
    // visual urgency: red countdown when <2s left
    if(remaining <= 2.0) countdown.classList.add('urgent'); else countdown.classList.remove('urgent');
  }, 100);

  recognition = setupRecognition();
  if(!recognition){
    showDialog("This iPhone doesn't support speech recognition. Use Safari!", 4000);
    stopMicUI();
    return;
  }

  var resolved = false;
  var heardAny = false;
  var allHeardTranscripts = [];

  recognition.onresult = function(ev){
    if(resolved) return;
    resolved = true;
    var alts = [];
    if(ev.results && ev.results[0]){
      for(var i=0; i<ev.results[0].length; i++){
        var t = (ev.results[0][i].transcript || '').trim().toLowerCase();
        if(t){
          alts.push(t);
          allHeardTranscripts.push(t);
        }
      }
    }
    heardAny = alts.length > 0;
    stopMicUI();
    // Try to match against any alternative
    for(var k=0; k<alts.length; k++){
      if(lenientMatch(word, alts[k])){
        doCheck(alts);
        return;
      }
    }
    // No match — but they said something. Show the override dialog.
    if(heardAny){
      showHeardOverride(alts);
    } else {
      showRetryDialog("I didn't hear you. Tap 🎤 again.");
    }
  };
  recognition.onerror = function(ev){
    if(resolved) return;
    resolved = true;
    stopMicUI();
    if(ev.error === 'no-speech'){
      showRetryDialog("I didn't hear you. Tap 🎤 again.");
    } else if(ev.error === 'aborted'){
      // silent
    } else if(ev.error === 'not-allowed' || ev.error === 'service-not-allowed'){
      showDialog('Mic permission needed. Check Safari settings.', 3000);
    } else {
      showRetryDialog('Try again — tap 🎤');
    }
  };
  recognition.onend = function(){
    if(resolved) return;
    resolved = true;
    stopMicUI();
    // Window expired without onresult firing → no speech detected
    if(allHeardTranscripts.length){
      // shouldn't happen with continuous=false, but cover anyway
      showHeardOverride(allHeardTranscripts);
    } else {
      showRetryDialog("I didn't hear you. Tap 🎤 again.");
    }
  };

  try {
    recognition.start();
  } catch(e){
    // start() can throw "already started" — abort and retry next tap
    resolved = true;
    stopMicUI();
    showDialog('Tap the mic again 🎤', 1200);
    return;
  }

  // Politely STOP (not abort) at LISTEN_SECONDS — lets a pending result finalize
  listenTimer = setTimeout(function(){
    if(recognition && !resolved){
      try { recognition.stop(); } catch(e){}
    }
  }, LISTEN_SECONDS * 1000);
}

// Stop just the UI feedback (not recognition itself, which finalizes async)
function stopMicUI(){
  var btn = document.getElementById('mic-btn');
  var label = document.getElementById('mic-label');
  var countdown = document.getElementById('mic-countdown');
  btn.classList.remove('listening');
  btn.textContent = '🎤';
  label.textContent = 'TAP TO SPEAK';
  countdown.classList.remove('show');
  countdown.classList.remove('urgent');
  if(listenTimer){ clearTimeout(listenTimer); listenTimer=null; }
  if(listenInterval){ clearInterval(listenInterval); listenInterval=null; }
  recognition = null;
}

function lenientMatch(target, heard){
  target = (target||'').toLowerCase().trim();
  heard = (heard||'').toLowerCase().trim().replace(/[.,!?;:'"]/g,'');
  if(!heard || !target) return false;

  // Direct
  if(heard === target) return true;

  // Homophone table
  var subs = HOMOPHONES[target] || [];
  for(var i=0;i<subs.length;i++) if(heard === subs[i]) return true;

  // Length-scaled fuzzy: 1 edit for 1-2 char targets, 2 edits for 3-6, 3 for 7+
  var allowedEdits = target.length <= 2 ? 1 : (target.length <= 6 ? 2 : 3);
  if(levenshtein(target, heard) <= allowedEdits) return true;

  // Substring: target found inside heard phrase ("see the cat" matches "cat")
  // Use word boundaries so 'in' doesn't match 'inside'
  var wordRe = new RegExp('(^|[^a-z])' + target.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '($|[^a-z])');
  if(wordRe.test(heard)) return true;
  // Heard inside target ("ca" matches "cat" — kid swallowed final consonant)
  if(target.length >= 3 && heard.length >= 2 && target.indexOf(heard) === 0) return true;

  // Per-word check on heard phrase
  var heardWords = heard.split(/\s+/);
  for(var i=0;i<heardWords.length;i++){
    var hw = heardWords[i];
    if(!hw) continue;
    if(hw === target) return true;
    for(var j=0;j<subs.length;j++) if(hw === subs[j]) return true;
    if(levenshtein(target, hw) <= allowedEdits) return true;
    // initial-letters match for very short targets ("a" → "ay" → "a")
    if(target.length === 1 && hw[0] === target) return true;
  }

  // First-letter + length match for tiny targets when context is noisy
  // e.g. target "is" heard "this" — already caught by homophone, but cover gap
  if(target.length <= 3){
    for(var i=0;i<heardWords.length;i++){
      var hw = heardWords[i];
      if(hw && hw.length <= target.length + 2 && hw.indexOf(target) !== -1) return true;
    }
  }

  return false;
}

function levenshtein(a,b){
  if(a===b) return 0;
  if(!a) return b.length;
  if(!b) return a.length;
  var m = []; for(var i=0;i<=b.length;i++) m[i]=[i];
  for(var j=0;j<=a.length;j++) m[0][j]=j;
  for(var i=1;i<=b.length;i++){
    for(var j=1;j<=a.length;j++){
      m[i][j] = b[i-1]===a[j-1] ? m[i-1][j-1] : Math.min(m[i-1][j-1]+1, m[i][j-1]+1, m[i-1][j]+1);
    }
  }
  return m[b.length][a.length];
}

function doCheck(alts){
  for(var i=0;i<alts.length;i++){
    if(lenientMatch(word, alts[i])){
      correct();
      return;
    }
  }
  miss();
}

function correct(){
  state.phase = 'celebrating';
  state.combo++;
  state.totalCorrect++;
  state.bestStreak = Math.max(state.bestStreak, state.combo);
  state.sessionWords.push({word:word, correct:true});
  state.weights[word] = 1;
  // Sticker: first time mastering this word
  var newSticker = !state.stickers[word];
  state.stickers[word] = Date.now();
  playCorrectSound();

  document.getElementById('qblock').classList.add('bumped');
  setTimeout(function(){
    document.getElementById('qblock').classList.remove('bumped');
    drawQBlock(true);
  }, 400);

  if(newSticker){
    setTimeout(function(){ showStickerEarned(word); }, 200);
  }

  setTimeout(spawnEnemy, 600);
}

function miss(){
  state.combo = 0;
  state.weights[word] = (state.weights[word] || 1) + 1;
  state.sessionWords.push({word:word, correct:false});
  playWrongSound();
  showDialog('Try again! The word is "'+word+'" 🎤', 1700);
  setTimeout(function(){
    if(state.phase === 'listening' || state.phase === 'celebrating'){
      state.phase = 'listening';
      document.getElementById('mic-label').textContent = 'TAP TO SPEAK';
    }
  }, 1700);
}

      '<button id="override-no" style="background:#888;color:#fff;border:2px solid #000;border-radius:4px;padding:6px 12px;font-family:\'Press Start 2P\',monospace;font-size:9px;cursor:pointer;box-shadow:2px 2px 0 #000">↻ TRY AGAIN</button>' +

  }
}

// ---- ENEMY SPAWN (rotates Goomba / Koopa / Piranha) ----
var enemyRotation = 0; // counter to rotate

function pickEnemyType(){
  // World-based rotation: world 0 mostly Goomba, escalating variety
  var roll = Math.random();
  if(state.worldIdx === 0){
    if(roll < 0.7) return 'goomba';
    return 'koopa';
  } else if(state.worldIdx === 1){
    if(roll < 0.4) return 'goomba';
    if(roll < 0.75) return 'koopa';
    return 'piranha';
  } else {
    if(roll < 0.3) return 'goomba';
    if(roll < 0.6) return 'koopa';
    return 'piranha';
  }
}

function spawnEnemy(){

  goombaActive = true;
  var type = pickEnemyType();
  var entLayer = document.getElementById('entities-layer');

    // Open-mouth animation cycle (chomp)
    var chompTimer = setInterval(function(){
      if(!p.parentNode){ clearInterval(chompTimer); return; }
      var open = p.querySelector('img').src.indexOf('Mn7Y') !== -1; // toggle by checking known unique substr
      // simpler: just toggle a class flag
      if(p.dataset.open === '1'){

    // After short pause, Mario fireball or jump-over to defeat
    setTimeout(function(){
      defeatPiranha(p);
    }, 1100);
    return;
  }

  // Goomba or Koopa: walks in from right
  var g = document.createElement('div');
  g.className = 'enemy enemy-' + type + ' walking';
  g.style.right = '-50px';
  g.style.bottom = '0';
  if(type === 'koopa'){
    g.innerHTML = spriteImg('koopa_walk1');
    // alternate koopa walking frames
    var kFrame = 1;
    var kTimer = setInterval(function(){
      if(!g.parentNode){ clearInterval(kTimer); return; }
      kFrame = kFrame===1?2:1;
      g.innerHTML = spriteImg('koopa_walk'+kFrame);
    }, 220);
    g._frameTimer = kTimer;
  } else {
    g.innerHTML = spriteImg('goomba');
  }
  entLayer.appendChild(g);

  var pos = -50;
  var marioLeftPx = stage.width * 0.14 + 28;
  var targetPx = stage.width - marioLeftPx - 120;
  var walkTimer = setInterval(function(){
    pos += 4;
    g.style.right = pos + 'px';
    if(pos >= targetPx){
      clearInterval(walkTimer);
      if(g._frameTimer) clearInterval(g._frameTimer);
      marioJumpAndStomp(g, type);
    }
  }, 30);
}

// Backwards-compat shim — older code paths may call spawnGoomba
function spawnGoomba(){ spawnEnemy(); }

function defeatPiranha(p){
  // If Mario has fire power, throw a fireball; otherwise jump over and Mario "kicks" it down
  if(state.powerLevel === 'fire'){
    fireballAttack(p);
  } else {
    // Star power = stomp anyway, otherwise side-jump kick
    sideKick(p);
  }
}

function fireballAttack(p){
  var m = document.getElementById('mario');
  setMarioFrame('jump');
  // Spawn fireball flying to piranha
  var stage = document.getElementById('stage').getBoundingClientRect();
  var fb = document.createElement('div');
  fb.className = 'fireball';
  fb.style.left = (stage.width * 0.14 + 32) + 'px';
  fb.style.bottom = '40px';
  fb.innerHTML = '🔥';
  document.getElementById('entities-layer').appendChild(fb);
  playJumpSound();
  // Animate
  var fbPos = stage.width * 0.14 + 32;
  var targetX = stage.width - 100;
  var fbTimer = setInterval(function(){
    fbPos += 12;
    fb.style.left = fbPos + 'px';
    if(fbPos >= targetX){
      clearInterval(fbTimer);
      if(fb.parentNode) fb.parentNode.removeChild(fb);
      // Burn the piranha
      if(p._chompTimer) clearInterval(p._chompTimer);
      p.style.transition = 'transform .4s, opacity .4s';
      p.style.transform = 'scale(.3) rotate(180deg)';
      p.style.opacity = '0';
      playStompSound();
      setTimeout(function(){
        if(p.parentNode) p.parentNode.removeChild(p);
        coinPop();
        state.enemyKills.piranha++;
        afterStomp();
      }, 380);
    }
  }, 30);
}

function sideKick(p){
  // Mario doesn't actually approach — piranha just retracts and disappears
  // We'll just have Mario "wave" and the plant sinks back
  setMarioFrame('celebrate');
  setTimeout(function(){ setMarioFrame(0); }, 400);
  if(p._chompTimer) clearInterval(p._chompTimer);
  p.style.transition = 'transform .5s ease-in, opacity .5s';
  p.style.transform = 'translateY(40px)';
  p.style.opacity = '0';
  playStompSound();
  setTimeout(function(){
    if(p.parentNode) p.parentNode.removeChild(p);
    coinPop();
    state.enemyKills.piranha++;
    afterStomp();
  }, 480);
}

function marioJumpAndStomp(enemy, type){
  type = type || 'goomba';
  var m = document.getElementById('mario');
  if(!enemy || !enemy.parentNode){ afterStomp(); return; }

  var eRect = enemy.getBoundingClientRect();
  var mRect = m.getBoundingClientRect();
  // Position Mario so he lands on the LEFT half of the enemy, leaving the enemy's
  // right half visible. We aim Mario's right edge at the enemy's center.
  var marioRightX = mRect.left + mRect.width;
  var enemyLeftQuarterX = eRect.left + eRect.width * 0.35;  // a bit left of center
  var offsetX = enemyLeftQuarterX - marioRightX;
  // Don't overshoot — leave a tiny gap so Mario isn't drawn beyond the enemy
  if(offsetX < 0) offsetX = 0;  // safety: never move backwards

  var prevTransition = m.style.transition;

  setMarioFrame('jump');
  playJumpSound();

  // Phase 1: Mario leaps up AND across simultaneously (parabolic feel)
  m.style.transition = 'transform .42s cubic-bezier(.2,.7,.4,1.0), bottom .42s ease-out';
  m.style.transform = 'translateX(' + offsetX + 'px)';
  m.style.bottom = '70px'; // arc apex
  // Animate walk frames during the in-air movement for a "running" look
  var f = 1;
  var runTimer = setInterval(function(){
    f = f === 1 ? 2 : 1;
    setMarioFrame(f);
  }, 90);

  setTimeout(function(){
    clearInterval(runTimer);
    setMarioFrame('jump');
    // Phase 2: Mario lands ON the enemy
    m.style.transition = 'transform .15s ease-in, bottom .22s ease-in';
    var landBottom = (type === 'koopa') ? 24 : (type === 'piranha' ? 60 : 18);
    m.style.bottom = landBottom + 'px';

    setTimeout(function(){
      // Stomp impact at the moment of landing
      stompEnemy(enemy, type);
      setMarioFrame('jump');

      // Phase 3: Tiny rebound bounce after stomp
      m.style.transition = 'bottom .14s ease-out';
      m.style.bottom = (landBottom + 18) + 'px';
      setTimeout(function(){
        // Phase 4: Drop to ground and walk back to start
        m.style.transition = 'transform .35s ease-out, bottom .25s ease-in';
        m.style.transform = 'translateX(0px)';
        m.style.bottom = '0px';
        var f2 = 1;
        var walkBack = setInterval(function(){
          f2 = f2 === 1 ? 2 : 1;
          setMarioFrame(f2);
        }, 130);
        setTimeout(function(){
          clearInterval(walkBack);
          setMarioFrame(0);
          m.style.transition = prevTransition || 'transform .15s,height .25s,width .25s';
        }, 360);
      }, 140);
    }, 220);
  }, 420);
}

function stompEnemy(g, type){
  type = type || 'goomba';
  if(!g) { afterStomp(); return; }
  playStompSound();
  if(type === 'koopa'){
    // Koopa: shell-pop animation — flip and slide
    g.style.transition = 'transform .35s, opacity .35s';
    g.style.transform = 'scaleY(0.4) translateY(15px) rotate(180deg)';
    g.style.opacity = '0.4';
    state.enemyKills.koopa++;
  } else {
    // Goomba: classic squish
    g.style.transition = 'transform .25s';
    g.style.transform = 'scaleY(0.3) translateY(20px)';
    state.enemyKills.goomba++;
  }
  setTimeout(function(){
    if(g && g.parentNode) g.parentNode.removeChild(g);
    coinPop();
    afterStomp();
  }, 320);
}

// Backwards-compat
function stompGoomba(g){ stompEnemy(g, 'goomba'); }

function afterStomp(){
  goombaActive = false;
  state.score++;
  state.worldProgress++;
  updateScoreDisplay();
  updateProgressBar();
  save();

  checkPowerUps();

  // Level up check (every 10 correct)
  if(state.worldProgress >= 10){
    setTimeout(function(){
      waitForPicker(showLevelUp);
    }, 800);
    return;
  }

  // Summary every 5 correct (mid-level)
  if(state.totalCorrect > 0 && state.totalCorrect % 5 === 0 && state.worldProgress < 10){
    setTimeout(function(){
      waitForPicker(showSummary);
    }, 800);
    return;
  }

  setTimeout(function(){
    waitForPicker(function(){
      state.phase = 'idle';
      spawn();
    });
  }, 700);
}

// Block the next gameplay step until any pending item picker is dismissed.
function waitForPicker(cb){
  if(!itemPickerActive){ cb(); return; }
  var iv = setInterval(function(){
    if(!itemPickerActive){
      clearInterval(iv);
      cb();
    }
  }, 80);
}

// ---- POWER-UP PICKUPS ----
// At combo 3 → mushroom (small → big)
// At combo 5 → fire flower (big/small → fire)
// At combo 7 → super star (10sec invincibility, sparkles, 1-shot enemies)
function checkPowerUps(){
  // Every 3rd correct word: offer a 3-item treasure pick.
  if(state.combo > 0 && state.combo % 3 === 0){
    setTimeout(function(){ showItemPicker(); }, 350);
  } else if(state.combo === 10){
    coinShower();
  }
}

// ---- ITEM PICKER ----
var itemPickerActive = false;

function buildItemPool(){
  var pool = [];
  if(state.powerLevel === 'small') pool.push('mushroom');
  if(state.powerLevel !== 'fire' && state.powerLevel !== 'star') pool.push('fire');
  pool.push('star'); pool.push('star');
  pool.push('oneup'); pool.push('oneup');
  pool.push('coins'); pool.push('coins'); pool.push('coins');
  pool.push('costume');
  return pool;
}

function pickThreeItems(){
  var pool = buildItemPool();
  var shuffled = pool.slice().sort(function(){ return Math.random() - 0.5; });
  var picks = [];
  var seen = {};
  for(var i=0; i<shuffled.length && picks.length<3; i++){
    if(!seen[shuffled[i]]){
      picks.push(shuffled[i]);
      seen[shuffled[i]] = true;
    }
  }
  while(picks.length < 3) picks.push('coins');
  return picks;
}

function showItemPicker(){
  if(itemPickerActive) return;
  itemPickerActive = true;
  var dialog = document.getElementById('dialog');
  if(!dialog){ itemPickerActive = false; return; }

  var items = pickThreeItems();
  var html = '<div class="picker-title">🎁 PICK A REWARD!</div>';
  html += '<div class="picker-row">';
  items.forEach(function(kind, idx){
    html += '<button class="picker-card" data-idx="'+idx+'" data-kind="'+kind+'">';
    html += '<div class="picker-icon">' + itemIcon(kind) + '</div>';
    html += '<div class="picker-name">' + itemName(kind) + '</div>';
    html += '</button>';
  });
  html += '</div>';
  dialog.innerHTML = html;
  dialog.classList.add('show');
  dialog.classList.add('picker-mode');

  Array.prototype.forEach.call(dialog.querySelectorAll('.picker-card'), function(btn){
    btn.onclick = function(){
      var kind = btn.getAttribute('data-kind');
      Array.prototype.forEach.call(dialog.querySelectorAll('.picker-card'), function(b){
        b.disabled = true;
        if(b !== btn) b.style.opacity = '0.3';
      });
      btn.classList.add('chosen');
      setTimeout(function(){
        dialog.classList.remove('show');
        dialog.classList.remove('picker-mode');
        dialog.innerHTML = '';
        applyItemReward(kind);
        itemPickerActive = false;
      }, 380);
    };
  });
}

function itemIcon(kind){
  if(kind === 'mushroom') return spriteImg('pu_mushroom');
  if(kind === 'fire') return spriteImg('pu_leaf');
  if(kind === 'star') return spriteImg('pu_star');
  if(kind === 'oneup') return '<div class="picker-emoji">🆙</div>';
  if(kind === 'coins') return '<div class="picker-emoji">🪙</div>';
  if(kind === 'costume') return '<div class="picker-emoji">👕</div>';
  return '<div class="picker-emoji">❓</div>';
}

function itemName(kind){
  if(kind === 'mushroom') return 'MUSHROOM';
  if(kind === 'fire') return 'FIRE LEAF';
  if(kind === 'star') return 'STAR';
  if(kind === 'oneup') return '1-UP';
  if(kind === 'coins') return '+5 COINS';
  if(kind === 'costume') return 'NEW LOOK';
  return '?';
}

function applyItemReward(kind){
  if(kind === 'mushroom' || kind === 'fire' || kind === 'star'){
    applyPowerUp(kind);
  } else if(kind === 'oneup'){
    showDialog('🆙 1-UP!', 1100);
    playPowerUp();
    state.score += 10;
    coinShower();
    save();
  } else if(kind === 'coins'){
    state.score += 5;
    showDialog('+5 COINS! 🪙', 900);
    playCoinSound();
    coinPop();
    setTimeout(coinPop, 100);
    setTimeout(coinPop, 200);
    save();
  } else if(kind === 'costume'){
    var current = state.costumeId;
    var others = COSTUMES.filter(function(c){ return c.id !== current; });
    if(others.length){
      var pick = others[Math.floor(Math.random() * others.length)];
      state.costumeId = pick.id;
      showDialog('👕 ' + pick.name.toUpperCase() + '!', 1300);
      playPowerUp();
      drawTitleMario();
      setMarioFrame(0);
      save();
    }
  }
}

function spawnPickup(kind){
  var qblock = document.getElementById('qblock');
  var stage = document.getElementById('stage');
  var entLayer = document.getElementById('entities-layer');
  if(!qblock || !stage || !entLayer) return;
  var qbRect = qblock.getBoundingClientRect();
  var stageRect = stage.getBoundingClientRect();

  // Bump the q-block
  qblock.classList.add('bumped');
  setTimeout(function(){ qblock.classList.remove('bumped'); }, 400);

  var sprite = kind === 'mushroom' ? 'pu_mushroom'
             : kind === 'fire'     ? 'pu_leaf'    // Use leaf graphic for fire (red leaf reads as fire flower at small size)
             : kind === 'star'     ? 'pu_star'
             : 'pu_mushroom';

  // Create pickup element
  var p = document.createElement('div');
  p.className = 'pickup pickup-' + kind;
  p.dataset.kind = kind;
  var startLeft = qbRect.left - stageRect.left + 4;
  var startTop = qbRect.top - stageRect.top - 8;
  p.style.left = startLeft + 'px';
  p.style.top = startTop + 'px';
  p.innerHTML = spriteImg(sprite);
  entLayer.appendChild(p);

  playPowerUp();
  showDialog(
    kind === 'mushroom' ? '🍄 GRAB THE MUSHROOM!'
    : kind === 'fire'   ? '🌸 GRAB THE FIRE FLOWER!'
    : kind === 'star'   ? '⭐ GRAB THE STAR!'
    : 'POWER-UP!',
    1400
  );

  // Float-up animation: rises 50px, then drifts down/right slowly
  var phase = 0; // 0=rising, 1=drifting
  var t0 = Date.now();
  var floatTimer = setInterval(function(){
    if(!p.parentNode){ clearInterval(floatTimer); return; }
    var t = (Date.now() - t0) / 1000;
    if(phase === 0){
      var rise = Math.min(50, t * 60);
      p.style.transform = 'translateY(' + (-rise) + 'px)';
      if(rise >= 50){ phase = 1; t0 = Date.now(); }
    } else {
      // Drift gently in a small arc around the q-block
      var drift = Math.sin(t * 2) * 12;
      p.style.transform = 'translateY(-50px) translateX(' + drift + 'px)';
    }
  }, 30);
  p._floatTimer = floatTimer;

  // Tappable
  p.style.pointerEvents = 'auto';
  p.style.cursor = 'pointer';
  p.addEventListener('click', function ev(e){
    e.stopPropagation();
    p.removeEventListener('click', ev);
    pickupGrabbed(p, kind);
  });

  // Auto-collect after 8 seconds if not tapped (so the game doesn't stall)
  setTimeout(function(){
    if(p.parentNode){
      pickupGrabbed(p, kind);
    }
  }, 8000);
}

function pickupGrabbed(p, kind){
  if(p._floatTimer) clearInterval(p._floatTimer);
  // Sparkle + remove
  p.style.transition = 'transform .3s, opacity .3s';
  p.style.transform = (p.style.transform || '') + ' scale(2)';
  p.style.opacity = '0';
  setTimeout(function(){
    if(p.parentNode) p.parentNode.removeChild(p);
  }, 300);

  // Apply effect
  applyPowerUp(kind);
}

function applyPowerUp(kind){
  var m = document.getElementById('mario');
  if(kind === 'mushroom'){
    state.powerLevel = 'big';
    showDialog('🍄 SUPER MARIO!', 1300);
  } else if(kind === 'fire'){
    state.powerLevel = 'fire';
    showDialog('🌸 FIRE MARIO!', 1300);
  } else if(kind === 'star'){
    state.powerLevel = 'star';
    state.starUntil = Date.now() + 10000; // 10 sec
    showDialog('⭐ STAR POWER!', 1500);
    // Auto-revert after 10s
    setTimeout(function(){
      if(state.powerLevel === 'star' && Date.now() >= state.starUntil){
        state.powerLevel = 'big'; // drop down to big after star
        setMarioFrame(0);
      }
    }, 10000);
  }
  // Burst effect
  burstSparkle(m);
  // Update sprite immediately
  setMarioFrame(0);
  playPowerUp();
  save();
}

function burstSparkle(target){
  var stage = document.getElementById('stage');
  var fx = document.getElementById('fx-layer');
  if(!stage || !fx) return;
  var rect = target.getBoundingClientRect();
  var stageRect = stage.getBoundingClientRect();
  var cx = rect.left - stageRect.left + rect.width/2;
  var cy = rect.top - stageRect.top + rect.height/2;
  for(var i=0;i<10;i++){
    (function(idx){
      var s = document.createElement('div');
      s.className = 'sparkle';
      s.style.left = cx + 'px';
      s.style.top = cy + 'px';
      var ang = (idx / 10) * Math.PI * 2;
      var dx = Math.cos(ang) * 60;
      var dy = Math.sin(ang) * 60;
      s.style.setProperty('--dx', dx + 'px');
      s.style.setProperty('--dy', dy + 'px');
      s.textContent = '✨';
      fx.appendChild(s);
      setTimeout(function(){ if(s.parentNode) s.parentNode.removeChild(s); }, 700);
    })(i);
  }
}

function coinShower(){
  var fx = document.getElementById('fx-layer');
  var stage = document.getElementById('stage').getBoundingClientRect();
  for(var i=0;i<24;i++){
    (function(idx){
      setTimeout(function(){
        var c = document.createElement('div');
        c.className = 'coin-particle';
        c.style.left = (Math.random()*stage.width) + 'px';
        c.style.top = (40 + Math.random()*80) + 'px';
        c.style.setProperty('--dx', ((Math.random()-.5)*180)+'px');
        c.innerHTML = spriteImg('coin');
        fx.appendChild(c);
        playCoinSound();
        setTimeout(function(){
          if(c && c.parentNode) c.parentNode.removeChild(c);
        }, 1300);
      }, idx*40);
    })(i);
  }
}

function showLevelUp(){
  state.phase = 'levelup';
  playFanfare();

  var nextLabel = WORLDS[nextIdx].label;

  html += '<div class="lu-sub">You read 10 words! 🎉</div>';

  lu.innerHTML = html;

  document.getElementById('lu-next-btn').onclick = function(){

function applyWorld(idx){

function updateProgressBar(){

    html += '<div class="pip'+(i<state.worldProgress?' fill':'')+'"></div>';

}

function shakeStage(){
  var sh = document.getElementById('shake');
  sh.classList.remove('shake'); void sh.offsetWidth;
  sh.classList.add('shake');
}
function doFlash(){
  var fl = document.getElementById('flash');

}

function showDialog(text, dur){

  d.textContent = text;
  d.classList.add('show');
  setTimeout(function(){
    d.classList.remove('show');
  }, dur || 1800);

function updateScoreDisplay(){

      state.worldProgress = 0;
      state.combo = 0;
      state.powerLevel = 'small';
      var m = document.getElementById('mario');
      m.classList.remove('big','big-power','fire-power','invinc','star-power');
      setMarioFrame(0);
      updateProgressBar();
      save();
      closeMenu();
      state.phase='idle';
      setTimeout(spawn, 300);
    }
  };
  document.getElementById('menu-costumes').onclick = showCostumes;
  document.getElementById('menu-words').onclick = showWords;
  document.getElementById('menu-music').onclick = function(){
    state.musicOn = !state.musicOn;
    if(state.musicOn) startBgMusic(); else stopBgMusic();
    document.getElementById('music-toggle').textContent = state.musicOn ? '♫ ON' : '♫ OFF';
    save();
    showMenu();
  };
  document.getElementById('menu-reset').onclick = function(){
    if(confirm('Reset ALL progress? (coins, streak, words, stickers)')){
      try { localStorage.removeItem(SAVE_KEY); } catch(e){}
      location.reload();
    }
  };
}
function closeMenu(){
  document.getElementById('menu-overlay').classList.remove('show');
  if(state.phase === 'summary' || state.phase === 'levelup'){
    // already paused — let user click their continue button
  } else if(state.phase !== 'celebrating') {
    state.phase = 'idle';
    if(!word) setTimeout(spawn, 200);
  }
}

// ---- STICKER BOOK ----
// Shows all words the kid has mastered, as colorful badges.
// Each sticker uses a deterministic background color/emoji based on the word.
function stickerBadge(w, earnedAt){
  // Deterministic hue from word
  var h = 0;
  for(var i=0;i<w.length;i++) h = (h * 31 + w.charCodeAt(i)) % 360;
  var emojis = ['⭐','🍄','🌟','💎','🪙','🌸','🦋','🌈','🍓','🐢','🐱','🚀','🎈','🎉','🏆','✨'];
  var emoji = emojis[Math.abs(h) % emojis.length];
  var bg = 'hsl(' + h + ',75%,55%)';
  return '<div class="sticker" style="background:'+bg+'">' +
    '<div class="sticker-emoji">'+emoji+'</div>' +
    '<div class="sticker-word">'+w+'</div>' +
    '</div>';
}

function showStickers(){
  var earned = Object.keys(state.stickers || {}).sort();
  var allWords = getWordList();
  var total = allWords.length;
  var got = earned.length;

  var html = '<h2>🏆 STICKER BOOK</h2>';
  html += '<div class="sticker-progress">' + got + ' / ' + total + ' words mastered</div>';
  if(got === 0){
    html += '<div class="sticker-empty">Say words right and earn stickers! 🎤</div>';
  } else {
    html += '<div class="sticker-grid">';
    earned.forEach(function(w){
      html += stickerBadge(w, state.stickers[w]);
    });
    html += '</div>';
  }
  // Stats footer
  if(state.enemyKills){
    var ek = state.enemyKills;
    html += '<div class="sticker-stats">' +
      '👾 ' + (ek.goomba||0) + ' &nbsp; ' +
      '🐢 ' + (ek.koopa||0) + ' &nbsp; ' +
      '🌱 ' + (ek.piranha||0) +
      '</div>';
  }
  html += '<button class="menu-back" id="back-btn">← BACK</button>';
  document.getElementById('menu-content').innerHTML = html;
  document.getElementById('back-btn').onclick = showMenu;
}

// Shown briefly on a new sticker earn during gameplay
function showStickerEarned(w){
  var fx = document.getElementById('fx-layer');
  if(!fx) return;
  var pop = document.createElement('div');
  pop.className = 'sticker-earned';
  pop.innerHTML = '<div class="se-line1">🏆 NEW STICKER!</div>' +
                  '<div class="se-line2">' + w + '</div>';
  fx.appendChild(pop);
  setTimeout(function(){ if(pop.parentNode) pop.parentNode.removeChild(pop); }, 1700);
}

function showCostumes(){
  var html = '<h2>👕 PICK A LOOK</h2><div class="menu-row">';
  COSTUMES.forEach(function(c){
    html += '<div class="costume-card '+(c.id===state.costumeId?'selected':'')+'" data-id="'+c.id+'">';
    var key = (c.spriteSet || 'mario') + '_idle';
    html += '<div class="costume-thumb"'+(c.filter?' style="filter:'+c.filter+'"':'')+'>'+spriteImg(key)+'</div>';
    html += '<div class="name">'+c.name+'</div>';
    html += '</div>';
  });
  html += '</div>';
  html += '<button class="menu-back" id="back-btn">← BACK</button>';
  document.getElementById('menu-content').innerHTML = html;
  document.querySelectorAll('.costume-card').forEach(function(card){
    card.onclick = function(){
      state.costumeId = card.getAttribute('data-id');
      save();
      drawTitleMario();
      setMarioFrame(0);
      showCostumes();
    };
  });
  document.getElementById('back-btn').onclick = function(){
    if(document.getElementById('title').classList.contains('hide')) showMenu();
    else closeMenu();
  };
}

// ---- DICTIONARY MANAGER ----
function showWords(){
  var wlist = getWordList().slice();
  var isCustom = !!(state.customWords && state.customWords.length>0);
  var html = '<h2>📖 WORD LIST</h2>';
  html += '<div class="dict-info">'+wlist.length+' words. '+
          (isCustom?'(Custom list)':'(Default list)')+'</div>';
  html += '<div class="dict-add">';
  html += '<input type="text" id="new-word" placeholder="Add word..." maxlength="20" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false">';
  html += '<button id="add-word-btn">+ ADD</button>';
  html += '</div>';
  html += '<div class="dict-list" id="dict-list">';
  wlist.forEach(function(w){
    html += '<span class="dict-pill">'+escapeHtml(w)+' <button data-w="'+escapeHtml(w)+'" class="rm-word">✕</button></span>';
  });
  html += '</div>';
  html += '<div class="menu-row">';
  html += '<button class="btn-secondary" id="reset-words-btn">🔄 RESET TO DEFAULT</button>';
  html += '</div>';
  html += '<button class="menu-back" id="back-btn">← BACK</button>';
  document.getElementById('menu-content').innerHTML = html;

  function commitList(list){
    // dedupe + lowercase + trim, drop empties
    var seen = {}; var out = [];
    list.forEach(function(w){
      w = String(w||'').toLowerCase().trim();
      if(w && !seen[w] && /^[a-z'-]+$/.test(w)){ seen[w]=1; out.push(w); }
    });
    state.customWords = out;
    save();
  }

  document.getElementById('add-word-btn').onclick = function(){
    var inp = document.getElementById('new-word');
    var v = inp.value.toLowerCase().trim();
    if(!v) return;
    if(!/^[a-z'-]+$/.test(v)){
      showDialog('Use letters only', 1200); return;
    }
    var current = getWordList().slice();
    if(current.indexOf(v) === -1){
      current.push(v);
      commitList(current);
    }
    inp.value = '';
    showWords();
  };
  document.getElementById('new-word').addEventListener('keydown', function(e){
    if(e.key === 'Enter'){ document.getElementById('add-word-btn').click(); }
  });
  document.querySelectorAll('.rm-word').forEach(function(btn){
    btn.onclick = function(){
      var w = btn.getAttribute('data-w');
      var current = getWordList().slice().filter(function(x){return x !== w;});
      if(current.length === 0){
        showDialog('Need at least 1 word', 1200);
        return;
      }
      commitList(current);
      showWords();
    };
  });
  document.getElementById('reset-words-btn').onclick = function(){
    if(confirm('Reset word list to default?')){
      state.customWords = null;
      save();
      showWords();
    }
  };
  document.getElementById('back-btn').onclick = function(){
    if(document.getElementById('title').classList.contains('hide')) showMenu();
    else closeMenu();
  };
}

// ---- INIT ----
function init(){
  load();
  drawTitleMario();
  drawCoinsIcon();
  drawQBlock(false);
  setMarioFrame(0);
  renderScenery();
  updateScoreDisplay();
  updateProgressBar();
  document.getElementById('music-toggle').textContent = state.musicOn ? '♫ ON' : '♫ OFF';
  applyWorld(state.worldIdx);
}

document.addEventListener('DOMContentLoaded', init);

// Tap-to-start (audio unlock)
document.getElementById('start-listen-tap').addEventListener('click', function(){
  ensureAudio();
  unlockAudio();
  state.audioReady = true;
  document.getElementById('start-listen-tap').classList.add('hide');
  if(state.musicOn) startBgMusic();
});

document.getElementById('btn-start').addEventListener('click', function(){
  ensureAudio();
  unlockAudio();
  if(state.musicOn) startBgMusic();
  document.getElementById('title').classList.add('hide');
  startMarioWalkAnimation();
  setTimeout(function(){
    stopMarioWalkAnimation();
    state.phase = 'idle';
    spawn();
  }, 1200);
});
document.getElementById('btn-costumes').addEventListener('click', showCostumes);
document.getElementById('btn-words').addEventListener('click', showWords);

document.getElementById('mic-btn').addEventListener('click', function(){
  ensureAudio();
  unlockAudio();
  // Don't allow mic during item picker — kid should pick a card first
  if(itemPickerActive){
    // Briefly highlight the picker dialog to show what's blocking
    var d = document.getElementById('dialog');
    if(d) {
      d.classList.add('shake-attn');
      setTimeout(function(){ d.classList.remove('shake-attn'); }, 400);
    }
    return;
  }
  if((state.phase === 'idle' || state.phase === 'celebrating') && word){
    state.phase = 'listening';
  }
  if(state.phase !== 'listening'){
    showDialog('Wait for the word to appear 👀', 1200);
    return;
  }
  startMic();
});

document.getElementById('menu-btn').addEventListener('click', function(){
  // close any goomba in flight before opening menu
  showMenu();
});

document.getElementById('music-toggle').addEventListener('click', function(){
  state.musicOn = !state.musicOn;
  if(state.musicOn) startBgMusic(); else stopBgMusic();
  document.getElementById('music-toggle').textContent = state.musicOn ? '♫ ON' : '♫ OFF';
  save();
});

</script>
