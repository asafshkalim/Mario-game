<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mario Sight Words</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;touch-action:manipulation;margin:0;padding:0;}
html{height:100dvh;} body{height:100dvh;}
body{font-family:'Press Start 2P',monospace;background:#5c94fc;}

.screen{position:fixed;top:0;left:0;right:0;bottom:0;width:100%;height:100dvh;display:none;flex-direction:column;align-items:center;justify-content:center;}
.screen.on{display:flex;}

#tap{position:fixed;inset:0;background:radial-gradient(circle,#1a0a40,#000);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;}
#tap h2{color:#fbd000;font-size:clamp(1rem,5vw,1.4rem);text-align:center;line-height:2;margin-bottom:16px;text-shadow:3px 3px 0 #e52b2b,6px 6px 0 #000;animation:tWiggle 2s ease-in-out infinite;}
@keyframes tWiggle{0%,100%{transform:rotate(-2deg) scale(1)}50%{transform:rotate(2deg) scale(1.05)}}
#tap p{color:#fff;font-size:clamp(.5rem,2.5vw,.7rem);opacity:.9;animation:tBlink 1s steps(2) infinite;}
@keyframes tBlink{50%{opacity:.3}}
.tap-hand{font-size:5rem;animation:hb .9s ease-in-out infinite alternate;margin-bottom:16px;}
@keyframes hb{from{transform:scale(1)}to{transform:scale(1.25)}}

#title{background:linear-gradient(180deg,#5c94fc 60%,#c84c0c 60%,#c84c0c 70%,#8B4513 70%);overflow:hidden;}
.clouds{position:absolute;top:8%;width:100%;display:flex;justify-content:space-around;pointer-events:none;font-size:2.5rem;}
.cl{animation:cf 3s ease-in-out infinite alternate;}
.cl:nth-child(2){animation-delay:.8s;}.cl:nth-child(3){animation-delay:1.5s;}
@keyframes cf{from{transform:translateY(0)}to{transform:translateY(-8px)}}
.t-coins{position:absolute;width:100%;height:100%;pointer-events:none;}
.t-coin{position:absolute;font-size:1.5rem;animation:tCoinFall 4s linear infinite;}
@keyframes tCoinFall{0%{transform:translateY(-50px) rotate(0deg)}100%{transform:translateY(110vh) rotate(720deg)}}
.t-mush{font-size:5rem;margin-bottom:10px;animation:tb 0.6s ease-in-out infinite alternate;filter:drop-shadow(4px 4px 0 #000);}
@keyframes tb{from{transform:translateY(0) rotate(-5deg)}to{transform:translateY(-15px) rotate(5deg)}}
.t-box{background:#1a0a00;border:4px solid #fbd000;padding:20px 24px;text-align:center;margin-bottom:20px;box-shadow:6px 6px 0 #e52b2b,10px 10px 0 #fbd000;animation:tBoxPulse 2s ease-in-out infinite;}
@keyframes tBoxPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
.t-box h1{color:#fbd000;font-size:clamp(.7rem,3.5vw,1.1rem);line-height:2.2;text-shadow:2px 2px 0 #a07000;}
.t-box p{color:#fff;font-size:clamp(.4rem,2vw,.55rem);margin-top:4px;}
#music-btn{position:absolute;top:10px;right:12px;font-family:'Press Start 2P',monospace;background:rgba(0,0,0,.4);color:#fff;border:2px solid #fff;font-size:.4rem;padding:6px 10px;cursor:pointer;}

.btn{font-family:'Press Start 2P',monospace;border:none;cursor:pointer;margin:5px;padding:13px 26px;font-size:clamp(.48rem,2.4vw,.72rem);touch-action:manipulation;position:relative;}
.by{background:#fbd000;color:#1a0a00;border-bottom:4px solid #a07000;border-right:4px solid #a07000;animation:btnGlow 1.5s ease-in-out infinite;}
@keyframes btnGlow{0%,100%{box-shadow:0 0 0 #fbd000}50%{box-shadow:0 0 24px #fbd000}}
.br{background:#e52b2b;color:#fff;border-bottom:4px solid #8b0000;border-right:4px solid #8b0000;}
.bg{background:#2ecc40;color:#fff;border-bottom:4px solid #1a7a28;border-right:4px solid #1a7a28;}
.bgr{background:#888;color:#fff;border-bottom:4px solid #444;border-right:4px solid #444;}
.btn:active{transform:translate(2px,2px);}

#game{background:linear-gradient(180deg,#5c94fc 65%,#5a8a3c 65%,#5a8a3c 72%,#8B4513 72%);}
#game.on{display:block;position:fixed;top:0;left:0;right:0;bottom:0;width:100%;height:100dvh;}
#game.shake{animation:shake .3s;}
@keyframes shake{0%,100%{transform:translate(0,0)}25%{transform:translate(-8px,-4px)}50%{transform:translate(8px,4px)}75%{transform:translate(-4px,8px)}}

#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(0,0,0,.6);z-index:10;border-bottom:2px solid #fbd000;}
#hud-score{color:#fbd000;font-size:clamp(.6rem,2.8vw,.9rem);text-shadow:2px 2px 0 #c84c0c;}
#hud-label{color:#fff;font-size:clamp(.3rem,1.5vw,.45rem);}
#combo-display{position:absolute;top:8px;left:50%;transform:translateX(-50%);color:#fbd000;font-size:clamp(.4rem,2vw,.55rem);text-shadow:2px 2px 0 #e52b2b;display:none;animation:comboBounce .5s ease;}
@keyframes comboBounce{0%{transform:translateX(-50%) scale(0)}50%{transform:translateX(-50%) scale(1.4)}100%{transform:translateX(-50%) scale(1)}}
#mbtn{font-family:'Press Start 2P',monospace;background:transparent;color:#fff;border:2px solid #fff;font-size:clamp(.28rem,1.3vw,.4rem);padding:5px 9px;cursor:pointer;}

#stage{position:absolute;top:44px;left:0;right:0;bottom:0;overflow:hidden;}
.sc{position:absolute;top:8%;font-size:2.5rem;pointer-events:none;opacity:.8;}
#sc1{left:10%;animation:cf 12s ease-in-out infinite alternate;}
#sc2{left:55%;font-size:1.8rem;animation:cf 18s ease-in-out infinite alternate 3s;}

.bg-enemy{position:absolute;bottom:28%;font-size:1.6rem;pointer-events:none;animation:bgWalk 18s linear infinite;}
@keyframes bgWalk{0%{left:-10%;transform:scaleX(1)}49%{left:110%;transform:scaleX(1)}50%{left:110%;transform:scaleX(-1)}99%{left:-10%;transform:scaleX(-1)}100%{left:-10%;transform:scaleX(1)}}
#bge1{animation-duration:22s;animation-delay:-3s;}
#bge2{animation-duration:28s;animation-delay:-12s;font-size:1.3rem;opacity:.7;}

.ground{position:absolute;bottom:0;left:0;right:0;height:28%;background:repeating-linear-gradient(90deg,#c84c0c 0,#c84c0c 48px,#a03a08 48px,#a03a08 50px);border-top:4px solid #e86010;}

#cw{position:absolute;bottom:30%;left:-160px;display:flex;flex-direction:column;align-items:center;z-index:5;}
#cs{width:96px;height:120px;display:flex;align-items:flex-end;justify-content:center;}
#cs svg{width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;shape-rendering:crispEdges;}
.walking svg{animation:wk .18s steps(2) infinite;}
@keyframes wk{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.idle-bounce svg{animation:idleBounce 1.4s ease-in-out infinite;}
@keyframes idleBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.celebrate svg{animation:celebrate .35s ease infinite;}
@keyframes celebrate{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-18px) rotate(-8deg)}75%{transform:translateY(-18px) rotate(8deg)}}

#poster{background:#fff;border:5px solid #222;box-shadow:3px 3px 0 #000;padding:10px 18px;margin-bottom:10px;text-align:center;position:relative;min-width:120px;display:none;animation:posterWiggle 2s ease-in-out infinite;}
@keyframes posterWiggle{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
#poster::after{content:'';position:absolute;bottom:-13px;left:50%;transform:translateX(-50%);width:4px;height:13px;background:#555;}
#pw{font-family:'Fredoka One',cursive;font-size:clamp(2rem,9vw,3.5rem);color:#1a0a00;}

#dlg{background:#fff;border:3px solid #1a0a00;border-radius:12px;padding:8px 12px;font-size:clamp(.4rem,1.8vw,.55rem);color:#1a0a00;position:absolute;top:-62px;left:50%;transform:translateX(-10%);white-space:nowrap;display:none;z-index:10;box-shadow:2px 2px 0 #000;}
#dlg::after{content:'';position:absolute;bottom:-9px;left:18px;border:5px solid transparent;border-top-color:#1a0a00;}

#heard{position:absolute;bottom:40%;left:50%;transform:translateX(-50%);background:#222;border:2px solid #fbd000;border-radius:8px;padding:6px 10px;font-size:.45rem;color:#fbd000;display:none;z-index:9;white-space:nowrap;}

#mic-area{position:absolute;bottom:15%;left:50%;transform:translateX(-50%);text-align:center;z-index:8;display:none;flex-direction:column;align-items:center;}
#micbtn{font-size:2.6rem;border:none;border-radius:50%;width:84px;height:84px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
#micbtn.idle{background:#fbd000;box-shadow:0 4px 0 #a07000,0 0 30px rgba(251,208,0,.6);animation:micBeckon 1.2s ease-in-out infinite;}
@keyframes micBeckon{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
#micbtn.live{background:#e52b2b;box-shadow:0 4px 0 #8b0000;animation:mp .7s ease-in-out infinite;}
@keyframes mp{0%,100%{box-shadow:0 4px 0 #8b0000,0 0 0 0 rgba(229,43,43,.6)}50%{box-shadow:0 4px 0 #8b0000,0 0 0 18px rgba(229,43,43,0)}}
#mic-lbl{color:#fff;font-size:clamp(.45rem,2vw,.6rem);margin-top:8px;text-shadow:1px 1px 0 #000;background:rgba(0,0,0,.5);padding:4px 8px;border-radius:4px;}
#waves{display:none;align-items:flex-end;justify-content:center;gap:3px;height:20px;margin-top:6px;}
.wb{width:4px;background:#fbd000;border-radius:2px;transition:height .12s;}

#slot{position:absolute;right:5%;bottom:28%;width:clamp(110px,30vw,170px);display:none;flex-direction:column;align-items:center;z-index:6;}
.sbody{background:linear-gradient(135deg,#fbd000,#e52b2b 50%,#922b21);border:4px solid #641e16;border-radius:12px 12px 4px 4px;padding:10px;width:100%;box-shadow:4px 4px 0 #000;position:relative;}
.slights{display:flex;justify-content:space-between;margin-bottom:6px;}
.sl{width:11px;height:11px;border-radius:50%;animation:lf .3s steps(1) infinite;box-shadow:0 0 8px currentColor;}
.sl:nth-child(1){background:#fbd000;color:#fbd000;}
.sl:nth-child(2){background:#e52b2b;color:#e52b2b;animation-delay:.1s;}
.sl:nth-child(3){background:#fff;color:#fff;animation-delay:.2s;}
.sl:nth-child(4){background:#2ecc40;color:#2ecc40;animation-delay:.15s;}
.sl:nth-child(5){background:#fbd000;color:#fbd000;animation-delay:.05s;}
@keyframes lf{0%,100%{opacity:1}50%{opacity:.2}}
.swin{background:#000;border:3px solid #555;border-radius:6px;height:clamp(70px,18vw,100px);display:flex;align-items:center;justify-content:center;margin-bottom:8px;box-shadow:inset 0 0 12px rgba(255,255,255,.2);overflow:hidden;}
#reel{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
#reel svg{width:75%;height:75%;}
#reel.spinning{animation:reelBlur .08s linear infinite;}
@keyframes reelBlur{0%,100%{filter:blur(0)}50%{filter:blur(2px)}}
.scta{color:#fff;font-size:.32rem;text-align:center;text-shadow:1px 1px 0 #000;}
#lev-wrap{position:absolute;right:-30px;top:14px;}
#levbtn{width:24px;background:transparent;border:none;cursor:pointer;padding:0;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;}
.lball{width:24px;height:24px;background:radial-gradient(circle at 35% 35%,#ff7777,#c0392b);border-radius:50%;border:2px solid #641e16;box-shadow:2px 2px 0 #000;transition:transform .15s;}
.lshaft{width:6px;height:50px;background:linear-gradient(90deg,#ccc,#888,#ccc);border-radius:3px;}
#levbtn:active .lball{transform:translateY(16px);}
#levbtn.off{opacity:.35;pointer-events:none;}
#levbtn.ready .lball{animation:leverPulse .6s ease-in-out infinite;}
@keyframes leverPulse{0%,100%{box-shadow:2px 2px 0 #000,0 0 0 0 rgba(255,119,119,.7)}50%{box-shadow:2px 2px 0 #000,0 0 0 12px rgba(255,119,119,0)}}

#flash{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:20;pointer-events:none;opacity:0;}
#flash svg{width:40%;height:40%;}
#flash.show{animation:fp 1.4s ease forwards;}
@keyframes fp{0%{opacity:0;transform:scale(.2) rotate(-20deg)}25%{opacity:1;transform:scale(1.6) rotate(15deg)}50%{transform:scale(1.2) rotate(-5deg)}75%{transform:scale(1.3) rotate(0deg)}100%{opacity:0;transform:scale(1.5)}}
